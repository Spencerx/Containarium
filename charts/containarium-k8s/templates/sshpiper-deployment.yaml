{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "containarium-k8s.fullname" . }}-sshpiper
  namespace: {{ .Values.gateway.namespace }}
  labels:
    {{- include "containarium-k8s.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "containarium-k8s.name" . }}-sshpiper
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "containarium-k8s.name" . }}-sshpiper
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "containarium-k8s.sshpiperServiceAccountName" . }}
      containers:
        - name: sshpiper
          image: {{ .Values.gateway.sshpiper.image }}
          imagePullPolicy: IfNotPresent
          env:
            # Route by the Pipe CRDs the daemon programs in this namespace.
            - name: PLUGIN
              value: kubernetes
            - name: SSHPIPERD_SERVER_KEY
              value: /serverkey/ssh_host_ed25519_key
          ports:
            - name: ssh
              containerPort: 2222
              protocol: TCP
          volumeMounts:
            - name: server-key
              mountPath: /serverkey/
              readOnly: true
          {{- with .Values.gateway.sshpiper.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: server-key
          secret:
            secretName: {{ .Values.gateway.sshpiper.serverKeySecret }}
            items:
              - key: server_key
                path: ssh_host_ed25519_key
{{- end }}
