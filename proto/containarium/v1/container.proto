syntax = "proto3";

package containarium.v1;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/footprintai/containarium/pkg/pb/containarium/v1;containariumv1";

// Custom option to attach string names to enum values
extend google.protobuf.EnumValueOptions {
  string state_name = 50001;
}

// OSType represents the operating system type for a container
enum OSType {
  // Unspecified OS type (defaults to Ubuntu 24.04)
  OS_TYPE_UNSPECIFIED = 0;

  // Ubuntu 24.04 LTS
  OS_TYPE_UBUNTU_2404 = 1;

  // Rocky Linux 9 (RHEL 9 rebuild, for dev/test)
  OS_TYPE_ROCKY_9 = 2;

  // Red Hat Enterprise Linux 9 (for production, requires subscription)
  OS_TYPE_RHEL_9 = 3;

  // Windows Server 2022 (runs as QEMU/KVM VM, RDP access)
  OS_TYPE_WINDOWS_2022 = 4;
}

// AccessType indicates how to connect to an instance
enum AccessType {
  // SSH access (default for Linux containers)
  ACCESS_TYPE_SSH = 0;

  // RDP access (for Windows VMs, via Guacamole browser-based client)
  ACCESS_TYPE_RDP = 1;
}

// ContainerState represents the current state of a container
enum ContainerState {
  // Unspecified state (should not be used)
  CONTAINER_STATE_UNSPECIFIED = 0 [(state_name) = "Unknown"];

  // Container is running
  CONTAINER_STATE_RUNNING = 1 [(state_name) = "Running"];

  // Container is stopped
  CONTAINER_STATE_STOPPED = 2 [(state_name) = "Stopped"];

  // Container is frozen (paused)
  CONTAINER_STATE_FROZEN = 3 [(state_name) = "Frozen"];

  // Container is being created
  CONTAINER_STATE_CREATING = 4 [(state_name) = "Creating"];

  // Container creation failed or is in error state
  CONTAINER_STATE_ERROR = 5 [(state_name) = "Error"];

  // Container is running but provisioning (installing stack/packages)
  CONTAINER_STATE_PROVISIONING = 6 [(state_name) = "Provisioning"];
}

// ResourceLimits defines resource constraints for a container
message ResourceLimits {
  // CPU limit (e.g., "4" for 4 cores)
  string cpu = 1;

  // Memory limit (e.g., "4GB", "2048MB")
  string memory = 2;

  // Disk/storage limit (e.g., "50GB", "100GB")
  string disk = 3;

  // GPU device ID for passthrough (e.g., "0" for first GPU, PCI address, or empty for none)
  string gpu = 4;
}

// NetworkInfo contains network configuration for a container
message NetworkInfo {
  // Primary IP address assigned to the container
  string ip_address = 1;

  // MAC address of the container's network interface
  string mac_address = 2;

  // Network interface name (e.g., "eth0")
  string interface = 3;

  // Network bridge name
  string bridge = 4;
}

// Container represents a complete container instance
message Container {
  // Unique container name (typically username-container)
  string name = 1;

  // Username who owns this container
  string username = 2;

  // Current state of the container
  ContainerState state = 3;

  // Resource limits applied to this container
  ResourceLimits resources = 4;

  // SSH public keys authorized for this container
  repeated string ssh_keys = 5;

  // Network information
  NetworkInfo network = 6;

  // Unix timestamp when container was created
  int64 created_at = 7;

  // Unix timestamp when container was last updated
  int64 updated_at = 8;

  // Custom labels for categorization and metadata
  map<string, string> labels = 9;

  // Image used to create the container (e.g., "images:ubuntu/24.04")
  string image = 10;

  // Whether Podman support is enabled (nesting)
  bool podman_enabled = 11;

  // Software stack installed in the container (e.g., "nodejs", "python")
  string stack = 12;

  // GPU device info (e.g., GPU ID or PCI address if attached)
  string gpu_device = 13;

  // Backend ID this container runs on (e.g., "gcp-spot", "tunnel-fts-5900x-gpu")
  string backend_id = 14;

  // Operating system type of the container
  OSType os_type = 15;

  // How to connect to this instance (SSH for Linux, RDP for Windows)
  AccessType access_type = 16;

  // RDP connection address (e.g., "10.100.0.50:3389") — populated for Windows VMs
  string rdp_address = 17;

  // Whether application-emitted OpenTelemetry is enabled for this
  // container (mirrors the --monitoring flag passed at creation).
  // When true, the LXC has OTEL_EXPORTER_OTLP_ENDPOINT and related
  // env vars stamped on it. Read-only — set at create time;
  // changing requires recreate (a ToggleMonitoring RPC may come
  // later, but doesn't exist in v1).
  bool monitoring_enabled = 18;

  // Pool tag of the backend hosting this container (e.g., "prod",
  // "demo", "lab"). Mirrors the peer's --pool registration tag and
  // is the discriminator used for placement and per-pool routing
  // (such as base-domain selection). Empty for untagged backends.
  string pool = 19;
}

// ContainerMetrics contains runtime metrics for a container
message ContainerMetrics {
  // Container name
  string name = 1;

  // CPU usage in seconds (cumulative CPU time used)
  int64 cpu_usage_seconds = 2;

  // Current memory usage in bytes
  int64 memory_usage_bytes = 3;

  // Peak memory usage in bytes
  int64 memory_peak_bytes = 4;

  // Disk usage in bytes (root filesystem)
  int64 disk_usage_bytes = 5;

  // Network bytes received (all interfaces except loopback)
  int64 network_rx_bytes = 6;

  // Network bytes transmitted (all interfaces except loopback)
  int64 network_tx_bytes = 7;

  // Number of running processes in container
  int32 process_count = 8;
}

// CreateContainerRequest is the request to create a new container
message CreateContainerRequest {
  // Username for the container (required)
  string username = 1;

  // Resource limits (optional, uses defaults if not specified)
  ResourceLimits resources = 2;

  // SSH public keys to authorize (optional, can be added later)
  repeated string ssh_keys = 3;

  // Custom labels (optional)
  map<string, string> labels = 4;

  // Container image to use (optional, defaults to images:ubuntu/24.04)
  string image = 5;

  // Enable Podman support (optional, defaults to true)
  bool enable_podman = 6;

  // Async mode - if true, returns immediately with CREATING state
  // Client should poll GetContainer to check completion
  bool async = 7;

  // Static IP address to assign (optional, e.g., "10.0.3.100")
  // Must be within the container network CIDR (e.g., 10.0.3.0/24)
  // If empty, DHCP will assign an IP automatically
  string static_ip = 8;

  // Software stack to install (optional, e.g., "nodejs", "python", "fullstack")
  // See available stacks in configs/stacks.yaml
  string stack = 9;

  // GPU device ID for passthrough (e.g., "0" for first GPU, PCI address, or empty for none)
  string gpu = 10;

  // Target backend ID for creation (empty = primary backend)
  string backend_id = 11;

  // Operating system type (takes precedence over image when set)
  OSType os_type = 12;

  // Stack parameters — passed to install scripts as env vars
  // (CONTAINARIUM_STACK_<key>). Set by the web UI's Create Container form
  // based on the selected stack's declared parameters. Optional.
  map<string, string> stack_parameters = 13;

  // Enable application-emitted OpenTelemetry. When true, the daemon
  // stamps the container with OTEL_EXPORTER_OTLP_ENDPOINT and
  // related env vars pointing at the core OTel collector, so any
  // OTel SDK inside the container ships telemetry to the platform's
  // VictoriaMetrics without app-side configuration. Default false —
  // opt-in matches the "platform doesn't move data unless told to"
  // principle and avoids surprise telemetry from prototype
  // workloads. The daemon's own cgroup-level metrics for the
  // container are independent of this flag and continue regardless.
  bool monitoring = 14;

  // Pool selector — when set and backend_id is empty, the daemon
  // picks any healthy peer tagged with this pool (--pool=<name> on
  // the peer's daemon). When both pool and backend_id are set, the
  // chosen backend_id must belong to this pool or the request is
  // rejected. Empty means "untagged backends only" (legacy behavior).
  string pool = 15;
}

// CreateContainerResponse is the response from creating a container
message CreateContainerResponse {
  // The created container
  Container container = 1;

  // Human-readable message about the creation
  string message = 2;

  // SSH connection string for the user (Linux containers)
  string ssh_command = 3;

  // RDP connection address (Windows VMs)
  string rdp_address = 4;
}

// ListContainersRequest is the request to list containers
message ListContainersRequest {
  // Filter by state (optional, empty means all states)
  ContainerState state = 1;

  // Filter by username (optional, empty means all users)
  string username = 2;

  // Filter by labels (optional, empty means no filter)
  map<string, string> label_filter = 3;
}

// ListContainersResponse is the response from listing containers
message ListContainersResponse {
  // List of containers matching the filter criteria
  repeated Container containers = 1;

  // Total count of containers
  int32 total_count = 2;
}

// GetContainerRequest is the request to get a specific container
message GetContainerRequest {
  // Username of the container to get
  string username = 1;
}

// GetContainerResponse is the response from getting a container
message GetContainerResponse {
  // The requested container
  Container container = 1;

  // Current metrics for the container (optional)
  ContainerMetrics metrics = 2;
}

// DebugContainerRequest is the request to debug a container's SSH path
message DebugContainerRequest {
  // Username of the container to debug
  string username = 1;
}

// DebugContainerResponse is the structured diagnostic report
message DebugContainerResponse {
  // Container runtime state from the daemon's view
  // ("running", "stopped", "missing", "error: <reason>")
  string container_state = 1;

  // Whether a host-level Linux user with this username exists
  bool host_user_exists = 2;

  // The shell column from /etc/passwd for this user (empty if no user)
  string host_user_shell = 3;

  // Whether the shell file in host_user_shell actually exists & is executable
  bool host_user_shell_exists = 4;

  // Last N sshd journal lines mentioning this username (rejections, accepts)
  repeated string recent_sshd_rejections = 5;

  // One-line human-readable diagnosis of the most likely cause
  string likely_cause = 6;

  // Ordered concrete remediation steps the caller can take
  repeated string next_actions = 7;

  // Public source repository for the daemon serving this report. Agents
  // can clone or webfetch this to grep for the exact code path that
  // generated a symptom — useful when the structured fields are
  // inconclusive (likely_cause == "no obvious host-side problem"…).
  string source_repo = 8;

  // Daemon version (containarium binary) that generated this report.
  // Pair with source_repo to read code at the exact commit/tag.
  string daemon_version = 9;
}

// DeleteContainerRequest is the request to delete a container
message DeleteContainerRequest {
  // Username of the container to delete
  string username = 1;

  // Force delete even if container is running
  bool force = 2;
}

// DeleteContainerResponse is the response from deleting a container
message DeleteContainerResponse {
  // Success message
  string message = 1;

  // Name of the deleted container
  string container_name = 2;
}

// StartContainerRequest is the request to start a container
message StartContainerRequest {
  // Username of the container to start
  string username = 1;
}

// StartContainerResponse is the response from starting a container
message StartContainerResponse {
  // Success message
  string message = 1;

  // Updated container state
  Container container = 2;
}

// StopContainerRequest is the request to stop a container
message StopContainerRequest {
  // Username of the container to stop
  string username = 1;

  // Force stop (kill) instead of graceful shutdown
  bool force = 2;

  // Timeout in seconds for graceful shutdown (default: 30)
  int32 timeout = 3;
}

// StopContainerResponse is the response from stopping a container
message StopContainerResponse {
  // Success message
  string message = 1;

  // Updated container state
  Container container = 2;
}

// ToggleMonitoringRequest enables / disables OTel app telemetry on
// an existing container. The four OTEL_* env vars are stamped (or
// unset) and the container is restarted so the new env reaches the
// app process.
message ToggleMonitoringRequest {
  // Username of the container.
  string username = 1;

  // Desired state. true → stamp env vars + restart. false → unset
  // env vars + restart so the SDK falls back to its buffer+drop
  // default.
  bool enabled = 2;
}

// ToggleMonitoringResponse reports the new monitoring state.
message ToggleMonitoringResponse {
  // Operator-facing summary of what changed (e.g. "monitoring
  // enabled — container restarted").
  string message = 1;

  // The effective monitoring_enabled state of the container after
  // the toggle (mirrors Container.monitoring_enabled in subsequent
  // GetContainer responses).
  bool monitoring_enabled = 2;
}

// AddSSHKeyRequest is the request to add an SSH key to a container
message AddSSHKeyRequest {
  // Username of the container
  string username = 1;

  // SSH public key to add
  string ssh_public_key = 2;
}

// AddSSHKeyResponse is the response from adding an SSH key
message AddSSHKeyResponse {
  // Success message
  string message = 1;

  // Total number of SSH keys now authorized
  int32 total_keys = 2;
}

// RemoveSSHKeyRequest is the request to remove an SSH key from a container
message RemoveSSHKeyRequest {
  // Username of the container
  string username = 1;

  // SSH public key to remove (exact match)
  string ssh_public_key = 2;
}

// RemoveSSHKeyResponse is the response from removing an SSH key
message RemoveSSHKeyResponse {
  // Success message
  string message = 1;

  // Total number of SSH keys remaining
  int32 total_keys = 2;
}

// GetMetricsRequest is the request to get container metrics
message GetMetricsRequest {
  // Username of the container (empty for all containers)
  string username = 1;
}

// GetMetricsResponse is the response from getting metrics
message GetMetricsResponse {
  // Metrics for requested container(s)
  repeated ContainerMetrics metrics = 1;
}

// ResizeContainerRequest is the request to resize container resources
message ResizeContainerRequest {
  // Username of the container to resize
  string username = 1;

  // New CPU limit (e.g., "4", "2-4") - empty means no change
  string cpu = 2;

  // New memory limit (e.g., "8GB", "4096MB") - empty means no change
  string memory = 3;

  // New disk size (e.g., "100GB") - empty means no change
  // Note: Can only increase, cannot shrink
  string disk = 4;
}

// ResizeContainerResponse is the response from resizing a container
message ResizeContainerResponse {
  // Success message
  string message = 1;

  // Updated container with new resources
  Container container = 2;
}

// Collaborator represents a user with access to a container
message Collaborator {
  // UUID identifier
  string id = 1;

  // Container name (e.g., "alice-container")
  string container_name = 2;

  // Container owner's username
  string owner_username = 3;

  // Collaborator's username (e.g., "bob")
  string collaborator_username = 4;

  // Full account name on jump server and container (e.g., "alice-container-bob")
  string account_name = 5;

  // SSH public key for this collaborator
  string ssh_public_key = 6;

  // Unix timestamp when collaborator was added
  int64 added_at = 7;

  // Who added this collaborator
  string created_by = 8;

  // Has full sudo access (not just su - owner)
  bool has_sudo = 9;

  // Has docker/podman group membership for container runtime access
  bool has_container_runtime = 10;
}

// AddCollaboratorRequest is the request to add a collaborator to a container
message AddCollaboratorRequest {
  // Container owner's username (e.g., "alice")
  string owner_username = 1;

  // Collaborator's username to add (e.g., "bob")
  string collaborator_username = 2;

  // SSH public key for the collaborator
  string ssh_public_key = 3;

  // Grant full sudo access (not just su - owner)
  bool grant_sudo = 4;

  // Add to docker/podman group for container runtime access
  bool grant_container_runtime = 5;
}

// AddCollaboratorResponse is the response from adding a collaborator
message AddCollaboratorResponse {
  // Success message
  string message = 1;

  // The created collaborator details
  Collaborator collaborator = 2;

  // SSH connection command for the collaborator
  string ssh_command = 3;
}

// RemoveCollaboratorRequest is the request to remove a collaborator from a container
message RemoveCollaboratorRequest {
  // Container owner's username
  string owner_username = 1;

  // Collaborator's username to remove
  string collaborator_username = 2;
}

// RemoveCollaboratorResponse is the response from removing a collaborator
message RemoveCollaboratorResponse {
  // Success message
  string message = 1;
}

// ListCollaboratorsRequest is the request to list collaborators for a container
message ListCollaboratorsRequest {
  // Container owner's username
  string owner_username = 1;
}

// ListCollaboratorsResponse is the response from listing collaborators
message ListCollaboratorsResponse {
  // List of collaborators
  repeated Collaborator collaborators = 1;

  // Total count of collaborators
  int32 total_count = 2;
}

// CleanupDiskRequest is the request to clean up disk space in a container
message CleanupDiskRequest {
  // Username of the container
  string username = 1;
}

// CleanupDiskResponse is the response from cleaning up disk space
message CleanupDiskResponse {
  // Human-readable summary of what was cleaned
  string message = 1;

  // Bytes freed by the cleanup
  int64 freed_bytes = 2;

  // Updated container info after cleanup
  Container container = 3;
}

// InstallStackRequest is the request to install a stack on a running container
message InstallStackRequest {
  // Username of the container
  string username = 1;

  // Stack or base script ID to install (e.g., "nodejs", "clamav")
  string stack_id = 2;
}

// InstallStackResponse is the response from installing a stack
message InstallStackResponse {
  // Human-readable result message
  string message = 1;

  // Updated container info after installation
  Container container = 2;
}

// StackParameter describes an input the stack accepts at install time.
// Returned by ListStacks so the web UI can render appropriate form fields.
message StackParameter {
  // Parameter key. The env var seen by install scripts is
  // CONTAINARIUM_STACK_<name>.
  string name = 1;
  // Human-readable label shown in the web UI.
  string label = 2;
  // Optional helper text shown below the field.
  string description = 3;
  // "string" | "password" | "number" | "boolean"
  string type = 4;
  // Default value if the user leaves the field blank.
  string default = 5;
  // Whether the field is required.
  bool required = 6;
}

// StackInfo describes a single software stack.
message StackInfo {
  string id = 1;
  string name = 2;
  string description = 3;
  string icon = 4;
  repeated StackParameter parameters = 5;
}

// ListStacksRequest requests the catalog of available stacks.
message ListStacksRequest {}

// ListStacksResponse returns all configured software stacks.
message ListStacksResponse {
  repeated StackInfo stacks = 1;
}

// GetMonitoringInfoRequest is the request to get monitoring info
message GetMonitoringInfoRequest {}

// GetMonitoringInfoResponse is the response with monitoring configuration
message GetMonitoringInfoResponse {
  // Whether monitoring is enabled
  bool enabled = 1;

  // Grafana URL for dashboard access
  string grafana_url = 2;

  // Victoria Metrics URL for metrics API
  string victoria_metrics_url = 3;
}

// MoveContainerRequest is the source-side request to migrate a
// container to a peer daemon.
message MoveContainerRequest {
  // Username of the container to move (required). Must exist on the
  // local daemon — moving a container the caller doesn't own returns
  // PermissionDenied.
  string username = 1;

  // Target backend ID — the peer daemon to migrate to. Must appear in
  // the source daemon's PeerPool. Trying to move to the local backend
  // is a no-op error.
  string target_backend_id = 2;

  // Maximum pre-copy delta iterations before forcing the cutover.
  // Each iteration copies the delta since the previous snapshot; with
  // each iteration the dirty set should shrink, reducing the final
  // cutover downtime. Range [0, 10]. Zero disables iterative delta
  // and goes straight to stop + full copy. Default 3.
  int32 max_iterations = 3;

  // If a delta iteration completes in less than this many seconds,
  // the caller decides the dirty set is small enough — skip remaining
  // iterations and go straight to cutover. Range [1, 60]. Default 5.
  int32 delta_threshold_seconds = 4;

  // When true, attempt CRIU-based live migration via `incus move
  // --stateful` — preserves process memory state and open sockets,
  // sub-second downtime even on active workloads. Requires CRIU
  // installed on both source and target, and is not supported for
  // containers running podman/docker-in-LXC. Defaults to false
  // (stop-and-copy) which is more reliable.
  bool stateful = 5;
}

// MoveContainerResponse summarizes the migration outcome.
message MoveContainerResponse {
  // Human-readable success message.
  string message = 1;

  // The container's new IP address on the target daemon, after start.
  string new_ip_address = 2;

  // Backend the container now lives on (target_backend_id from req).
  string target_backend_id = 3;

  // Total iterations performed (initial copy + N deltas + final).
  // Helpful for tuning max_iterations on subsequent moves of similar
  // workloads.
  int32 iterations_run = 4;

  // Total wall-clock seconds the container was unreachable during the
  // cutover (between stop on source and start on target with route
  // updated). With pre-copy + ZFS this should be < 5s; on dir-pool or
  // active workloads it may be tens of seconds. -1 if stateful=true
  // succeeded and there was no observable downtime.
  int32 downtime_seconds = 5;
}

// AdoptMigratedContainerRequest is sent by the source daemon's
// MoveContainer to the destination daemon AFTER `incus copy` has
// completed and the LXC exists on the destination's incusd. The
// destination then registers the container with its own Containarium
// state (host user account, route record at the new IP).
//
// Internal use only — exposed via REST for daemon-to-daemon coordination
// over the same PeerPool channel used by other forwarding RPCs.
message AdoptMigratedContainerRequest {
  // Username of the migrated container.
  string username = 1;

  // The source daemon's record of which routes belonged to this
  // container, so the destination can recreate them at its own
  // container IP. Each entry is "<full-domain>|<port>|<protocol>".
  // Empty for stateless containers with no exposed ports.
  repeated string source_routes = 2;
}

// AdoptMigratedContainerResponse confirms the destination registered
// the container and returns its IP for the source's route swap.
message AdoptMigratedContainerResponse {
  // Success message.
  string message = 1;

  // The migrated container's new IP address on the destination's
  // incusbr0. The source uses this for the final route store update.
  string new_ip_address = 2;
}
