syntax = "proto3";

package containarium.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "containarium/v1/container.proto";
import "containarium/v1/recipe.proto";

option go_package = "github.com/footprintai/containarium/pkg/pb/containarium/v1;containariumv1";

// =============================================================================
// Agent skills — Phase 0 (agent-as-a-box). See docs/AGENT-SKILLS-CREWS-DESIGN.md.
//
// An "agent skill" is a packaged, runnable agent: a Recipe (the box) plus an
// agent manifest (who it is, what tools it may call, who it may talk to). This
// file is the generic mechanism only — concrete skills ship outside this repo.
//
// Crews (collaborating sets of skills) and the agent-to-agent (A2A) transport
// are deferred to later phases (A2A: Phase 1; allowed_peers enforcement:
// Phase 2; Crew/CrewService: Phase 3). The `allowed_peers` field is defined
// here so manifests are forward-compatible, but it is inert until Phase 2.
// =============================================================================

// AgentCard is the discovery document a skill serves so peer agents can find
// it and learn how to delegate to it (A2A, Phase 1). It is carried in-proto so
// the wire format stays insulated from upstream A2A churn.
message AgentCard {
  // Stable handle used by peers to address this agent (e.g. "researcher").
  string id = 1;

  // Human-readable name.
  string name = 2;

  // What this agent does — surfaced to peers and to a planner.
  string description = 3;

  // Free-form capability tags a planner can match against (e.g.
  // "web-search", "code-review", "summarize").
  repeated string capabilities = 4;

  // JSON Schema describing the task input this agent accepts.
  string input_schema_json = 5;

  // JSON Schema describing the artifact this agent returns.
  string output_schema_json = 6;
}

// AgentSkill is a packaged, runnable agent: a Recipe (the box — image,
// resources, GPU) plus the agent layer (who it is, what tools it may call,
// who it may talk to). This is the unit `containarium agent run` launches.
//
// Key invariant: allowed_scopes and allowed_peers are typed, first-class
// fields — NOT a prompt string. allowed_scopes is minted into the agent's JWT
// at launch; allowed_peers compiles into eBPF network policy (Phase 2). The
// typing IS the security boundary.
message AgentSkill {
  // Stable skill identifier (e.g. "web-researcher").
  string id = 1;

  // Display name.
  string name = 2;

  // Short description.
  string description = 3;

  // The box this agent runs in. Either reference a built-in recipe by id, or
  // inline an ad-hoc recipe definition (exactly one).
  oneof box {
    // Reference an existing recipe by id (e.g. "agent-runtime").
    string recipe_id = 4;
    // Inline recipe definition for one-off skills.
    Recipe recipe = 5;
  }

  // System prompt / persona handed to the model inside the box.
  string system_prompt = 6;

  // Platform MCP scopes this agent is permitted to use (e.g.
  // "containers:read", "containers:create"). Validated against the scope
  // taxonomy in internal/auth/scopes.go; minted into the agent's JWT at
  // launch. Least-privilege: a skill gets ONLY what it declares.
  repeated string allowed_scopes = 7;

  // A2A discovery document this skill serves (Phase 1).
  AgentCard agent_card = 8;

  // IDs of the OTHER skills this skill is permitted to send A2A tasks to.
  // In Phase 2 this list compiles to an eBPF NetworkPolicy egress allowlist,
  // so an agent literally cannot open a socket to a non-allowed peer (enforced
  // in-kernel, not in prompt). A skill that is only allowed one peer cannot
  // reach any other. An empty list = talks to no peer (leaf agent). Inert
  // until Phase 2.
  repeated string allowed_peers = 9;

  // Model identifier the runtime should drive this agent with (e.g.
  // "claude-opus-4-8"). Empty = runtime default.
  string model = 10;
}

// ---- AgentSkillService request/response messages ----------------------------

message ListAgentSkillsRequest {}
message ListAgentSkillsResponse {
  repeated AgentSkill skills = 1;
}

message GetAgentSkillRequest {
  string id = 1;
}
message GetAgentSkillResponse {
  AgentSkill skill = 1;
}

// RunAgentSkillRequest launches a single skill in its box and sends it one
// task (no peers). Useful for testing a skill in isolation.
message RunAgentSkillRequest {
  string skill_id = 1;
  // Target backend/pool placement, same scheme as recipes.
  string backend_id = 2;
  string pool = 3;
  // JSON task input matching the skill's agent_card input schema.
  string input_json = 4;
}
message RunAgentSkillResponse {
  // The box the agent ran in.
  Container container = 1;
  // JSON artifact matching the skill's output schema.
  string artifact_json = 2;
}

// ---- A2A (agent-to-agent) task contract (Phase 1) ---------------------------
//
// One agent delegates a task to a peer and gets an artifact back. The shape
// mirrors the A2A (Agent2Agent) protocol's task/artifact lifecycle but is
// carried in our own proto so the wire format stays insulated from upstream
// A2A churn (see "A2A is young" in the design note). Transport + the in-box
// A2A server are wired in #569; this file defines only the contract.

// AgentTaskState tracks the lifecycle of a delegated A2A task.
enum AgentTaskState {
  AGENT_TASK_STATE_UNSPECIFIED = 0;
  AGENT_TASK_STATE_SUBMITTED = 1;
  AGENT_TASK_STATE_WORKING = 2;
  AGENT_TASK_STATE_COMPLETED = 3;
  AGENT_TASK_STATE_FAILED = 4;
}

// AgentTask is one unit of work delegated to a peer agent.
message AgentTask {
  // Task identifier (assigned by the caller; unique within a run).
  string id = 1;
  // JSON task input matching the peer's agent_card input schema.
  string input_json = 2;
}

// AgentArtifact is the result a peer agent returns for a task.
message AgentArtifact {
  // The task this artifact answers.
  string task_id = 1;
  // JSON output matching the peer's agent_card output schema.
  string output_json = 2;
  // Terminal state of the task.
  AgentTaskState state = 3;
  // Human-readable error when state is FAILED.
  string error = 4;
}

// SendAgentTaskRequest delegates a task to a running peer agent. The peer is
// addressed by its agent_card.id (or skill id). In Phase 2 the daemon will
// reject a send to a peer not in the caller's allowed_peers; in Phase 1 the
// field set is established and the send is best-effort over A2A.
message SendAgentTaskRequest {
  // The calling skill (for attribution + the future allowed_peers check).
  string from_skill_id = 1;
  // The target peer to deliver the task to.
  string to_peer_id = 2;
  // JSON task input matching the peer's agent_card input schema.
  string input_json = 3;

  // Correlation id threaded through the audit trail for this delegation. A
  // caller (e.g. a crew, Phase 3) sets it so every hop of a run shares one id;
  // when empty the daemon generates one. Echoed back in the response.
  string trace_id = 4;
}

// SendAgentTaskResponse returns the peer's artifact.
message SendAgentTaskResponse {
  AgentArtifact artifact = 1;
  // The trace id this hop was audited under (generated if the request omitted
  // one). Lets a caller chain subsequent hops under the same id.
  string trace_id = 2;
}

// AgentSkillService manages and runs individual packaged agents.
service AgentSkillService {
  // ListAgentSkills returns all available skills (built-in + registered).
  rpc ListAgentSkills(ListAgentSkillsRequest) returns (ListAgentSkillsResponse) {
    option (google.api.http) = {
      get: "/v1/agent-skills"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List agent skills";
      description: "Returns all packaged agent skills that can be run individually or composed into a crew.";
      tags: "Agents";
    };
  }

  // GetAgentSkill returns a single skill definition by id.
  rpc GetAgentSkill(GetAgentSkillRequest) returns (GetAgentSkillResponse) {
    option (google.api.http) = {
      get: "/v1/agent-skills/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get agent skill";
      description: "Returns one skill's definition, including its agent card, allowed scopes, and allowed peers.";
      tags: "Agents";
    };
  }

  // RunAgentSkill launches a single skill in a box and runs one task against
  // it. The agent's JWT is minted with exactly the skill's allowed_scopes.
  rpc RunAgentSkill(RunAgentSkillRequest) returns (RunAgentSkillResponse) {
    option (google.api.http) = {
      post: "/v1/agent-skills/{skill_id}/run"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Run an agent skill";
      description: "Provisions the skill's box, mints a scoped token, runs one task, and returns the artifact.";
      tags: "Agents";
    };
  }

  // SendAgentTask delegates a task to a running peer agent over A2A and returns
  // the peer's artifact. Phase 1 establishes the transport; Phase 2 adds the
  // allowed_peers / network-policy enforcement around it. (Server impl: #569.)
  rpc SendAgentTask(SendAgentTaskRequest) returns (SendAgentTaskResponse) {
    option (google.api.http) = {
      post: "/v1/agent-skills/{to_peer_id}/call"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Send a task to a peer agent (A2A)";
      description: "Delegates a task to a running peer agent over the agent-to-agent transport and returns the peer's artifact.";
      tags: "Agents";
    };
  }

  // ===========================================================================
  // Pull-based run queue (prototype). The push path (RunAgentSkill) provisions
  // a box and execs the run synchronously. The pull path inverts it: a producer
  // ENQUEUES a task; long-lived worker boxes LEASE tasks (outbound-only, so no
  // inbound exec is needed — NAT/tunnel-friendly), run them locally, and report
  // back with COMPLETE. Lease = an SQS-style visibility timeout: a leased task
  // is invisible to other workers until completed or the lease expires (then it
  // is redelivered), giving at-most-one active worker per task with crash
  // recovery. Phase 0 is an in-memory queue; durability is a follow-up.
  // See the pull-queue section of docs/AGENT-MODEL-GATEWAY-DESIGN.md.
  // ===========================================================================

  // EnqueueAgentTask places a task on the queue for the given skill and returns
  // its id. Producer side of the pull model.
  rpc EnqueueAgentTask(EnqueueAgentTaskRequest) returns (EnqueueAgentTaskResponse) {
    option (google.api.http) = {
      post: "/v1/agent-tasks"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Enqueue an agent task (pull queue)";
      description: "Places a task on the pull queue for a skill; worker boxes lease and run it.";
      tags: "Agents";
    };
  }

  // LeaseAgentTask hands the caller the next visible task (optionally filtered
  // to one skill), making it invisible for lease_seconds. Returns has_task=false
  // when the queue is empty. Worker poll side of the pull model.
  rpc LeaseAgentTask(LeaseAgentTaskRequest) returns (LeaseAgentTaskResponse) {
    option (google.api.http) = {
      post: "/v1/agent-tasks/lease"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Lease the next agent task (pull queue)";
      description: "Worker boxes poll this to lease the next task; the task is hidden from other workers until completed or the lease expires.";
      tags: "Agents";
    };
  }

  // CompleteAgentTask reports a leased task's result (artifact or error) and
  // removes it from the queue. Rejected (accepted=false) if the lease token is
  // stale — i.e. the lease already expired and the task was redelivered.
  rpc CompleteAgentTask(CompleteAgentTaskRequest) returns (CompleteAgentTaskResponse) {
    option (google.api.http) = {
      post: "/v1/agent-tasks/{task_id}/complete"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Complete a leased agent task (pull queue)";
      description: "Worker boxes report a leased task's artifact/error here; a stale lease is rejected.";
      tags: "Agents";
    };
  }

  // StartAgentWorker provisions (or reuses) a skill's box and launches the
  // in-box runtime in poll mode: a long-lived worker that leases tasks for the
  // skill, runs them, and reports back — the consumer side of the pull model.
  // The daemon mints a SEPARATE queue credential (a JWT scoped to agents:run,
  // distinct from the skill's in-box token) and seeds it so the box can reach
  // the queue endpoints; the worker resolves the daemon URL from its default
  // route (the backend host) at launch.
  rpc StartAgentWorker(StartAgentWorkerRequest) returns (StartAgentWorkerResponse) {
    option (google.api.http) = {
      post: "/v1/agent-skills/{skill_id}/worker"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Start a pull-queue worker for a skill";
      description: "Provisions the skill's box, mints an agents:run queue credential, and launches the in-box runtime in poll mode to lease and run queued tasks.";
      tags: "Agents";
    };
  }
}

// EnqueueAgentTaskRequest places one task on the pull queue.
message EnqueueAgentTaskRequest {
  // Skill this task is for (workers may filter their lease by it).
  string skill_id = 1;
  // Task input as JSON (the same shape RunAgentSkill takes as input_json).
  string input_json = 2;
}

message EnqueueAgentTaskResponse {
  // Server-assigned task id, used later to correlate the completion.
  string task_id = 1;
}

// LeaseAgentTaskRequest asks for the next runnable task.
message LeaseAgentTaskRequest {
  // Stable id of the polling worker (audit/debug; not a security boundary).
  string worker_id = 1;
  // Optional: lease only tasks for this skill. Empty = any skill.
  string skill_id = 2;
  // How long the lease is held before the task becomes visible again. 0 = a
  // server default. Keep it longer than the worst-case run time.
  int32 lease_seconds = 3;
}

message LeaseAgentTaskResponse {
  // False when the queue had nothing visible — the worker should back off.
  bool has_task = 1;
  string task_id = 2;
  string skill_id = 3;
  string input_json = 4;
  // Opaque token proving this worker holds the current lease; must be presented
  // to CompleteAgentTask. A new lease (after expiry) mints a new token, so a
  // slow worker's stale completion is rejected rather than clobbering a retry.
  string lease_token = 5;
}

// CompleteAgentTaskRequest reports a leased task's outcome.
message CompleteAgentTaskRequest {
  string task_id = 1;
  string lease_token = 2;
  // The run artifact as JSON; empty when error is set.
  string artifact_json = 3;
  // Non-empty when the run failed; the task is removed (no auto-retry in the
  // prototype) and the error is recorded.
  string error = 4;
}

message CompleteAgentTaskResponse {
  // False when the lease was stale (expired + redelivered); the worker should
  // drop its result — another lease owns the task now.
  bool accepted = 1;
}

// StartAgentWorkerRequest launches a poll-mode worker for a skill.
message StartAgentWorkerRequest {
  // Skill whose box runs as the worker (its persona is the worker's; the
  // worker leases only this skill's tasks).
  string skill_id = 1;
  // Target backend (must be local in the prototype).
  string backend_id = 2;
  // Target pool (unsupported in the prototype).
  string pool = 3;
  // Optional stable worker id for audit/debug; defaults to the box name.
  string worker_id = 4;
}

message StartAgentWorkerResponse {
  // The worker box.
  Container container = 1;
  // The worker id the daemon used.
  string worker_id = 2;
}

// =============================================================================
// Crews — Phase 3. A crew is a collaborating set of skills bound to a task
// purpose. The crew mechanism lives here; concrete crew definitions ship
// outside this repo. The daemon rejects a crew whose topology asks for an A2A
// edge that the members' allowed_peers (and thus Phase 2 network policy) would
// drop — the topology and the trust fabric stay consistent.
// =============================================================================

// CrewTopology describes how a crew's skills are wired together.
enum CrewTopology {
  CREW_TOPOLOGY_UNSPECIFIED = 0;
  // Linear pipeline: output of skill[i] feeds skill[i+1].
  CREW_TOPOLOGY_PIPELINE = 1;
  // A coordinator skill fans tasks out to worker skills and synthesizes.
  CREW_TOPOLOGY_ORCHESTRATOR = 2;
  // Skills coordinate freely over A2A within the allowed_peers graph; the crew
  // just bounds the set and the trace.
  CREW_TOPOLOGY_FREEFORM = 3;
}

// Crew is a collaborating set of skills bound to a task purpose.
message Crew {
  // Stable crew identifier (e.g. "research-crew").
  string id = 1;
  // Display name.
  string name = 2;
  // Short description of the task purpose.
  string description = 3;
  // How the skills are wired.
  CrewTopology topology = 4;
  // Skill ids that make up this crew (in pipeline order when PIPELINE;
  // coordinator first when ORCHESTRATOR).
  repeated string skill_ids = 5;
}

// CrewRunState tracks the lifecycle of a single crew execution.
enum CrewRunState {
  CREW_RUN_STATE_UNSPECIFIED = 0;
  CREW_RUN_STATE_PENDING = 1;
  CREW_RUN_STATE_RUNNING = 2;
  CREW_RUN_STATE_COMPLETED = 3;
  CREW_RUN_STATE_FAILED = 4;
  CREW_RUN_STATE_CANCELLED = 5;
}

// CrewRun is one execution of a crew. Every A2A hop and MCP call made by any
// agent in the run is audit-logged under this run's trace_id, so a run is
// itself an evidence artifact.
message CrewRun {
  string id = 1;
  string crew_id = 2;
  // Shared trace id threaded through every agent's audit entries for this run.
  string trace_id = 3;
  CrewRunState state = 4;
  // JSON input handed to the crew's entry skill(s).
  string input_json = 5;
  // JSON artifact produced by the crew. Populated when state is COMPLETED.
  string artifact_json = 6;
  // Human-readable error when state is FAILED.
  string error = 7;
}

message ListCrewsRequest {}
message ListCrewsResponse {
  repeated Crew crews = 1;
}

message GetCrewRequest {
  string id = 1;
}
message GetCrewResponse {
  Crew crew = 1;
}

message RunCrewRequest {
  string crew_id = 1;
  string backend_id = 2;
  string pool = 3;
  // JSON input for the crew's entry skill(s).
  string input_json = 4;
}
message RunCrewResponse {
  CrewRun run = 1;
}

message GetCrewRunRequest {
  string id = 1;
}
message GetCrewRunResponse {
  CrewRun run = 1;
}

// CrewService runs collaborating sets of skills bound to a task purpose.
service CrewService {
  // ListCrews returns all available crews.
  rpc ListCrews(ListCrewsRequest) returns (ListCrewsResponse) {
    option (google.api.http) = {
      get: "/v1/crews"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List crews";
      description: "Returns all crews (collaborating skill sets) available to run.";
      tags: "Agents";
    };
  }

  // GetCrew returns a single crew definition by id.
  rpc GetCrew(GetCrewRequest) returns (GetCrewResponse) {
    option (google.api.http) = {
      get: "/v1/crews/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get crew";
      description: "Returns one crew's definition, including its topology and member skills.";
      tags: "Agents";
    };
  }

  // RunCrew launches a crew against an input: validates the topology against the
  // union of member skills' allowed_peers, provisions each skill's box, compiles
  // per-agent network policy, threads one trace_id through every hop, and
  // returns the run handle.
  rpc RunCrew(RunCrewRequest) returns (RunCrewResponse) {
    option (google.api.http) = {
      post: "/v1/crews/{crew_id}/run"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Run a crew";
      description: "Provisions each skill's box, gates A2A traffic with network policy compiled from allowed_peers, runs the collaboration, and returns the run handle.";
      tags: "Agents";
    };
  }

  // GetCrewRun returns the status and artifact of a crew run.
  rpc GetCrewRun(GetCrewRunRequest) returns (GetCrewRunResponse) {
    option (google.api.http) = {
      get: "/v1/crew-runs/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get crew run";
      description: "Returns the state, trace id, and (when complete) the artifact of a crew execution.";
      tags: "Agents";
    };
  }
}
