syntax = "proto3";

package containarium.v1;

option go_package = "github.com/footprintai/containarium/pkg/pb/containarium/v1;containariumv1";

import "containarium/v1/config.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

// NetworkPolicyService — the control-plane CRUD for per-tenant network
// isolation policies (Phase A of the eBPF network-isolation design, #315).
//
// This is the policy *store* surface: operators (and the cloud control plane)
// set/get/list/delete a tenant's NetworkPolicy here; the per-veth TC_INGRESS
// BPF loader (a later increment) consumes the stored policies and programs the
// kernel. Admin-only — policies are fleet-shaping config, not tenant-editable.
service NetworkPolicyService {
  // SetNetworkPolicy creates or replaces a tenant's policy (upsert by tenant).
  // The policy is validated + normalized; the stored form is echoed back.
  rpc SetNetworkPolicy(SetNetworkPolicyRequest) returns (SetNetworkPolicyResponse) {
    option (google.api.http) = {
      post: "/v1/network-policies"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Set network policy";
      description: "Create or replace a tenant's network-isolation policy (validated + normalized). Admin-only.";
      tags: "NetworkPolicy";
    };
  }

  // GetNetworkPolicy returns a tenant's policy, or NotFound if none is set.
  rpc GetNetworkPolicy(GetNetworkPolicyRequest) returns (GetNetworkPolicyResponse) {
    option (google.api.http) = {
      get: "/v1/network-policies/{tenant}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get network policy";
      description: "Return a tenant's network-isolation policy. Admin-only.";
      tags: "NetworkPolicy";
    };
  }

  // ListNetworkPolicies returns every tenant's policy.
  rpc ListNetworkPolicies(ListNetworkPoliciesRequest) returns (ListNetworkPoliciesResponse) {
    option (google.api.http) = {
      get: "/v1/network-policies"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List network policies";
      description: "List every tenant's network-isolation policy. Admin-only.";
      tags: "NetworkPolicy";
    };
  }

  // DeleteNetworkPolicy removes a tenant's policy. Idempotent — deleting a
  // missing policy is not an error.
  rpc DeleteNetworkPolicy(DeleteNetworkPolicyRequest) returns (DeleteNetworkPolicyResponse) {
    option (google.api.http) = {
      delete: "/v1/network-policies/{tenant}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Delete network policy";
      description: "Remove a tenant's network-isolation policy (idempotent). Admin-only.";
      tags: "NetworkPolicy";
    };
  }

  // PatchNetworkPolicyDenyRules atomically adds/removes a tenant's virtual-patch
  // deny rules (#660) under a store-side lock, so concurrent edits don't lose
  // updates and `SetNetworkPolicy` (the allow-policy) never has to round-trip
  // through the client to preserve them. Echoes the normalized stored policy.
  rpc PatchNetworkPolicyDenyRules(PatchNetworkPolicyDenyRulesRequest) returns (SetNetworkPolicyResponse) {
    option (google.api.http) = {
      post: "/v1/network-policies/deny-rules"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Patch network-policy deny rules";
      description: "Atomically add/remove a tenant's virtual-patch deny rules (#660). Admin-only.";
      tags: "NetworkPolicy";
    };
  }

  // SetNetworkPolicySignature creates or replaces a global operator exploit
  // signature (#661 Tier 2, upsert by name). Validated + normalized; the stored
  // form (with its assigned id) is echoed back.
  rpc SetNetworkPolicySignature(SetNetworkPolicySignatureRequest) returns (SetNetworkPolicySignatureResponse) {
    option (google.api.http) = {
      post: "/v1/network-policy-signatures"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Set network-policy signature";
      description: "Create or replace a global cleartext exploit signature (#661). Admin-only.";
      tags: "NetworkPolicy";
    };
  }

  // ListNetworkPolicySignatures returns every operator-managed signature (the
  // built-in curated set is implicit and not listed here).
  rpc ListNetworkPolicySignatures(ListNetworkPolicySignaturesRequest) returns (ListNetworkPolicySignaturesResponse) {
    option (google.api.http) = {
      get: "/v1/network-policy-signatures"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List network-policy signatures";
      description: "List every operator-managed exploit signature (#661). Admin-only.";
      tags: "NetworkPolicy";
    };
  }

  // DeleteNetworkPolicySignature removes an operator signature by name.
  // Idempotent.
  rpc DeleteNetworkPolicySignature(DeleteNetworkPolicySignatureRequest) returns (DeleteNetworkPolicySignatureResponse) {
    option (google.api.http) = {
      delete: "/v1/network-policy-signatures/{name}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Delete network-policy signature";
      description: "Remove an operator-managed exploit signature (#661, idempotent). Admin-only.";
      tags: "NetworkPolicy";
    };
  }
}
