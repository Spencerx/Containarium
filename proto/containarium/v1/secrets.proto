syntax = "proto3";

package containarium.v1;

option go_package = "github.com/footprintai/containarium/pkg/pb/containarium/v1;containariumv1";

// SecretMetadata is the public-safe view of a stored secret.
// `value` is never returned by `ListSecrets` — only per-name `GetSecret`.
message SecretMetadata {
  // Username (tenant) that owns the secret.
  string username = 1;

  // Secret name. Matches `^[A-Z_][A-Z0-9_]*$` (Linux env-var convention,
  // up to 128 chars).
  string name = 2;

  // Monotonic version that bumps on every SetSecret for the same
  // (username, name). Useful for rotation diagnostics ("LXC env says
  // version=3, DB says version=4 → restart needed").
  int32 version = 3;

  // RFC3339 timestamps.
  string created_at = 4;
  string updated_at = 5;
}

// SetSecretRequest creates or updates a tenant secret. Idempotent —
// repeated calls with the same (username, name) bump the version and
// replace the value.
message SetSecretRequest {
  // Username (tenant) that owns the secret.
  string username = 1;

  // Secret name. Server enforces ^[A-Z_][A-Z0-9_]*$ + 128 char max
  // (per docs/SECRETS-MANAGEMENT-DESIGN.md decision #1).
  string name = 2;

  // Plaintext value the daemon will encrypt with its master key
  // before persisting. Server enforces a 64 KiB hard cap
  // (decision #2). Never logged.
  string value = 3;
}

message SetSecretResponse {
  // Operator-facing summary ("created" / "updated to version N").
  string message = 1;

  // Resulting metadata after the write.
  SecretMetadata secret = 2;
}

// GetSecretRequest reads a single secret's plaintext value. Always
// audit-logged. Auth: admin JWT in v1 (decision #3); per-LXC tokens
// in v2.
message GetSecretRequest {
  string username = 1;
  string name = 2;
}

message GetSecretResponse {
  SecretMetadata secret = 1;

  // The decrypted plaintext value. Caller's responsibility to keep
  // safe — once it's on the wire, the daemon's encryption guarantee
  // ends.
  string value = 2;
}

// ListSecretsRequest enumerates secrets for a tenant. Returns
// metadata only — never values.
message ListSecretsRequest {
  // Username (tenant) whose secrets to list.
  string username = 1;
}

message ListSecretsResponse {
  repeated SecretMetadata secrets = 1;
}

// DeleteSecretRequest removes a secret. Does NOT clean up env-var
// stamps on running containers — operators / agents re-stamp via
// RefreshSecrets if they want the change to reach a running process
// without a container restart.
message DeleteSecretRequest {
  string username = 1;
  string name = 2;
}

message DeleteSecretResponse {
  string message = 1;
}

// RefreshSecretsRequest re-stamps the LXC's environment.<NAME>
// config keys from the current secret DB state for the tenant. Used
// after rotation when the operator wants the next process exec'd in
// the LXC to see the new value without restarting the container.
//
// Running processes in the container do NOT pick up the new env
// (Linux environments are inherited at fork time, not refreshed).
// For that, the tenant restarts the container or starts a new
// process.
message RefreshSecretsRequest {
  string username = 1;
}

message RefreshSecretsResponse {
  string message = 1;
  // Count of env vars actually stamped (matches the number of
  // secrets owned by the tenant at refresh time).
  int32 stamped = 2;
}
