syntax = "proto3";

package containarium.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/footprintai/containarium/pkg/pb/containarium/v1;containariumv1";

// Phase 1.2 follow-up — admin-facing API to invalidate a JWT
// by its jti claim. Pairs with the revocation list landed in
// PR #248: the list is the kill-switch, this RPC + the
// `containarium token revoke` CLI verb is how operators pull
// the switch.

// RevokeTokenRequest names a token to invalidate.
message RevokeTokenRequest {
  // The `jti` claim of the token to revoke. Required.
  // Operators get the jti either from the audit trail
  // (every authenticated request logs its jti) or by
  // decoding the token they want to kill.
  string jti = 1;

  // Optional free-form reason recorded in the revocation
  // table for forensics. Examples: "user_logout",
  // "compromise_2026_05_20", "operator_revoke".
  string reason = 2;

  // Optional expiry hint — when the token's exp claim is.
  // Used as the cleanup horizon for the row. If omitted,
  // the daemon falls back to the configured max token
  // lifetime so the row eventually prunes itself.
  string expires_at = 3;
}

message RevokeTokenResponse {
  // True when a new revocation row was inserted; false when
  // the jti was already revoked (idempotent — the existing
  // revocation reason is preserved).
  bool newly_revoked = 1;

  // Human-readable confirmation, intended for CLI output.
  string message = 2;
}

// Phase 1.6 part B — exchange a refresh token for a new
// (access, refresh) pair. Rotates the refresh token:
// the prior jti is revoked on success, so each refresh
// token is single-use. Replay = denied + audit signal.
message RefreshTokenRequest {
  // The current refresh token. Must validate via
  // ValidateRefreshToken (signature + iss + aud + exp +
  // tt == "refresh") AND not be in the revocation list.
  string refresh_token = 1;
}

message RefreshTokenResponse {
  // New short-lived access token, ready to use as
  // Authorization: Bearer.
  string access_token = 1;

  // New refresh token. Save this — the one you just sent
  // in is now revoked and cannot be exchanged again.
  string refresh_token = 2;

  // Unix-seconds expiry of the access token, for clients
  // that want to refresh proactively before exp.
  int64 access_token_expires_at = 3;

  // Unix-seconds expiry of the refresh token.
  int64 refresh_token_expires_at = 4;
}

// Revocation is one row of the revocation list, surfaced
// by the admin listing path. The plaintext token itself is
// not in the table — only the jti is.
message Revocation {
  // The jti claim of the revoked token.
  string jti = 1;

  // RFC3339 timestamp of the token's original `exp` claim.
  // Used as the cleanup horizon (rows past this can no
  // longer authenticate anyway, so the daemon prunes
  // them eventually).
  string expires_at = 2;

  // RFC3339 timestamp of when the revocation row was
  // first inserted. Operators correlating an incident
  // window use this column.
  string revoked_at = 3;

  // Free-form reason recorded at revoke time (e.g.
  // "operator_revoke", "refresh_rotation", "leak_2026_X").
  string reason = 4;
}

message ListRevokedTokensRequest {
  // Max rows to return. 0 → 100 default. Server caps at
  // 1000.
  int32 limit = 1;

  // When true, include rows whose expires_at has already
  // passed (default false — most operators only care
  // about active revocations).
  bool include_expired = 2;

  // Narrow by jti prefix. Empty disables. Useful when an
  // operator only remembers part of a leaked jti.
  string jti_prefix = 3;
}

message ListRevokedTokensResponse {
  repeated Revocation revocations = 1;
}

// TokensService is the admin surface for JWT lifecycle.
//
// RevokeToken requires an admin role + tokens:write scope;
// tenants can't revoke other tenants' tokens. RefreshToken
// is open to any holder of a valid refresh token — that's
// the whole point of the exchange flow.
service TokensService {
  // RevokeToken adds a token's jti to the revocation list,
  // taking effect on the next authenticated request that
  // names it. Idempotent — repeated revokes are safe.
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse) {
    option (google.api.http) = {
      post: "/v1/tokens/revoke"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Revoke a JWT by its jti";
      description: "Adds the token's jti to the revocation list. The token will be rejected on the next request that tries to use it. Admin-only. Idempotent — revoking an already-revoked jti is a no-op (the original revocation reason is preserved).";
      tags: "Tokens";
    };
  }

  // RefreshToken exchanges a valid refresh token for a new
  // (access, refresh) pair. The prior refresh token's jti is
  // revoked on success — refresh tokens are SINGLE-USE.
  // Replay of an already-exchanged refresh token returns
  // Unauthenticated (it's now on the revocation list).
  //
  // Unauthenticated endpoint by design — the refresh token
  // itself IS the credential. Don't wrap with the access-
  // token middleware.
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse) {
    option (google.api.http) = {
      post: "/v1/tokens/refresh"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Exchange a refresh token for a new (access, refresh) pair";
      description: "Validates the refresh token (signature + exp + tt='refresh' + not revoked), mints a new short-lived access token, mints a new long-lived refresh token, and revokes the input refresh token's jti. Refresh tokens are single-use; the new refresh token must be stored by the client for the next exchange.";
      tags: "Tokens";
    };
  }

  // ListRevokedTokens enumerates active revocations.
  // Operators use this to confirm a revoke landed or to
  // investigate "what got killed during the incident window."
  // Admin-only + tokens:write scope (same surface as
  // RevokeToken — anyone who can revoke can enumerate).
  rpc ListRevokedTokens(ListRevokedTokensRequest) returns (ListRevokedTokensResponse) {
    option (google.api.http) = {
      get: "/v1/tokens/revoked"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List active token revocations";
      description: "Returns revocation rows ordered most-recent-first. Default scope is non-expired revocations only; pass include_expired=true for forensic enumeration. Admin-only with the tokens:write scope.";
      tags: "Tokens";
    };
  }
}
