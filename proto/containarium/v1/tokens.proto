syntax = "proto3";

package containarium.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/footprintai/containarium/pkg/pb/containarium/v1;containariumv1";

// Phase 1.2 follow-up — admin-facing API to invalidate a JWT
// by its jti claim. Pairs with the revocation list landed in
// PR #248: the list is the kill-switch, this RPC + the
// `containarium token revoke` CLI verb is how operators pull
// the switch.

// RevokeTokenRequest names a token to invalidate.
message RevokeTokenRequest {
  // The `jti` claim of the token to revoke. Required.
  // Operators get the jti either from the audit trail
  // (every authenticated request logs its jti) or by
  // decoding the token they want to kill.
  string jti = 1;

  // Optional free-form reason recorded in the revocation
  // table for forensics. Examples: "user_logout",
  // "compromise_2026_05_20", "operator_revoke".
  string reason = 2;

  // Optional expiry hint — when the token's exp claim is.
  // Used as the cleanup horizon for the row. If omitted,
  // the daemon falls back to the configured max token
  // lifetime so the row eventually prunes itself.
  string expires_at = 3;
}

message RevokeTokenResponse {
  // True when a new revocation row was inserted; false when
  // the jti was already revoked (idempotent — the existing
  // revocation reason is preserved).
  bool newly_revoked = 1;

  // Human-readable confirmation, intended for CLI output.
  string message = 2;
}

// TokensService is the admin surface for JWT lifecycle.
//
// All RPCs require an admin role; tenants can't revoke other
// tenants' tokens. Note that **a token CAN revoke itself**
// regardless of role — that's how the operator's own logout
// flow will eventually work — but a tenant calling revoke
// for a jti they don't recognize still needs admin.
service TokensService {
  // RevokeToken adds a token's jti to the revocation list,
  // taking effect on the next authenticated request that
  // names it. Idempotent — repeated revokes are safe.
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse) {
    option (google.api.http) = {
      post: "/v1/tokens/revoke"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Revoke a JWT by its jti";
      description: "Adds the token's jti to the revocation list. The token will be rejected on the next request that tries to use it. Admin-only. Idempotent — revoking an already-revoked jti is a no-op (the original revocation reason is preserved).";
      tags: "Tokens";
    };
  }
}
