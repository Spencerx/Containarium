syntax = "proto3";

package containarium.v1;

import "containarium/v1/container.proto";

option go_package = "github.com/footprintai/containarium/pkg/pb/containarium/v1;containariumv1";

// Config represents the system-wide configuration for Containarium
message Config {
  // Incus configuration
  IncusConfig incus = 1;

  // Default resource limits for new containers
  ResourceLimits default_resources = 2;

  // Default container image
  string default_image = 3;

  // Enable Docker support by default
  bool default_docker_enabled = 4;

  // Network configuration
  NetworkConfig network = 5;

  // Storage configuration
  StorageConfig storage = 6;

  // Security configuration
  SecurityConfig security = 7;

  // Default OS type for new containers
  OSType default_os_type = 8;
}

// IncusConfig contains Incus-specific configuration
message IncusConfig {
  // Incus socket path (default: /var/lib/incus/unix.socket)
  string socket_path = 1;

  // Project name to use (default: default)
  string project = 2;

  // Remote name (default: local)
  string remote = 3;

  // Timeout for Incus operations in seconds
  int32 timeout_seconds = 4;
}

// NetworkConfig contains network-related configuration
message NetworkConfig {
  // Network bridge name (default: incusbr0)
  string bridge_name = 1;

  // Subnet for container IPs (e.g., "10.0.3.0/24")
  string subnet = 2;

  // DHCP range start
  string dhcp_range_start = 3;

  // DHCP range end
  string dhcp_range_end = 4;

  // DNS servers for containers
  repeated string dns_servers = 5;

  // Enable IPv6
  bool enable_ipv6 = 6;
}

// StorageConfig contains storage-related configuration
message StorageConfig {
  // Storage pool name
  string pool_name = 1;

  // Storage driver (e.g., "dir", "zfs", "btrfs")
  string driver = 2;

  // Storage pool path
  string pool_path = 3;

  // Default disk quota for containers
  string default_disk_quota = 4;
}

// SecurityConfig contains security-related configuration
message SecurityConfig {
  // Use unprivileged containers (recommended: true)
  bool unprivileged_containers = 1;

  // AppArmor profile to use (default: "default")
  string apparmor_profile = 2;

  // SELinux context (if using SELinux)
  string selinux_context = 3;

  // Enable seccomp filtering
  bool enable_seccomp = 4;

  // Require SSH keys (don't allow password auth)
  bool require_ssh_keys = 5;

  // Minimum password length if passwords are allowed
  int32 min_password_length = 6;
}

// GetConfigRequest is the request to get current configuration
message GetConfigRequest {}

// GetConfigResponse is the response from getting configuration
message GetConfigResponse {
  // Current configuration
  Config config = 1;
}

// UpdateConfigRequest is the request to update configuration
message UpdateConfigRequest {
  // Updated configuration
  Config config = 1;

  // Fields to update (if empty, update all)
  repeated string update_mask = 2;
}

// UpdateConfigResponse is the response from updating configuration
message UpdateConfigResponse {
  // Success message
  string message = 1;

  // Updated configuration
  Config config = 2;
}

// SystemInfo contains information about the host system
message SystemInfo {
  // Incus version
  string incus_version = 1;

  // Operating system
  string os = 2;

  // Kernel version
  string kernel_version = 3;

  // Total CPU cores
  int32 total_cpus = 4;

  // Total memory in bytes
  int64 total_memory_bytes = 5;

  // Available memory in bytes
  int64 available_memory_bytes = 6;

  // Total disk space in bytes
  int64 total_disk_bytes = 7;

  // Available disk space in bytes
  int64 available_disk_bytes = 8;

  // Number of containers running
  int32 containers_running = 9;

  // Number of containers stopped
  int32 containers_stopped = 10;

  // Total number of containers
  int32 containers_total = 11;

  // Hostname of the system
  string hostname = 12;

  // Uptime in seconds
  int64 uptime_seconds = 13;

  // Container network CIDR (e.g., "10.100.0.0/24")
  string network_cidr = 14;

  // CPU load average (1 minute)
  double cpu_load_1min = 15;

  // CPU load average (5 minutes)
  double cpu_load_5min = 16;

  // CPU load average (15 minutes)
  double cpu_load_15min = 17;

  // GPU information
  repeated GPUInfo gpus = 18;

  // Backend ID (e.g., "tunnel-node-a-gpu") — set when returned from peer
  string backend_id = 19;

  // OTLP collector endpoint (e.g., "http://10.0.3.5:4318") that
  // monitoring=true containers ship app telemetry to. Empty when the
  // core OTel collector isn't provisioned. Advertised here so a tenant
  // or agent can discover where to point OTEL_EXPORTER_OTLP_ENDPOINT —
  // in particular for docker-in-LXC apps that don't inherit the
  // env-stamped value. See #370.
  string otel_collector_endpoint = 20;

  // Containarium daemon version of this backend (e.g. "0.21.0"), so the
  // fleet's running versions + drift are visible via get_system_info and
  // /v1/backends without SSHing each host. See #354.
  string daemon_version = 21;
}

// GPU vendor enum
enum GPUVendor {
  GPU_VENDOR_UNSPECIFIED = 0;
  GPU_VENDOR_NVIDIA = 1;
  GPU_VENDOR_AMD = 2;
  GPU_VENDOR_INTEL = 3;
}

// GPU model enum (common datacenter and workstation GPUs)
enum GPUModel {
  GPU_MODEL_UNSPECIFIED = 0;

  // NVIDIA Consumer
  GPU_MODEL_NVIDIA_RTX_4090 = 100;
  GPU_MODEL_NVIDIA_RTX_4080 = 101;
  GPU_MODEL_NVIDIA_RTX_4070_TI = 102;
  GPU_MODEL_NVIDIA_RTX_4070 = 103;
  GPU_MODEL_NVIDIA_RTX_3090 = 104;
  GPU_MODEL_NVIDIA_RTX_3080 = 105;
  GPU_MODEL_NVIDIA_RTX_5090 = 106;
  GPU_MODEL_NVIDIA_RTX_5080 = 107;

  // NVIDIA Datacenter
  GPU_MODEL_NVIDIA_A100 = 200;
  GPU_MODEL_NVIDIA_A10 = 201;
  GPU_MODEL_NVIDIA_A10G = 202;
  GPU_MODEL_NVIDIA_H100 = 203;
  GPU_MODEL_NVIDIA_H200 = 204;
  GPU_MODEL_NVIDIA_L4 = 205;
  GPU_MODEL_NVIDIA_L40 = 206;
  GPU_MODEL_NVIDIA_L40S = 207;
  GPU_MODEL_NVIDIA_T4 = 208;
  GPU_MODEL_NVIDIA_V100 = 209;
  GPU_MODEL_NVIDIA_B200 = 210;

  // AMD
  GPU_MODEL_AMD_MI300X = 300;
  GPU_MODEL_AMD_MI250X = 301;
  GPU_MODEL_AMD_RX_7900_XTX = 302;

  // Intel
  GPU_MODEL_INTEL_MAX_1550 = 400;
  GPU_MODEL_INTEL_ARC_A770 = 401;
}

// GPUInfo represents a GPU device on the system
message GPUInfo {
  // GPU vendor
  GPUVendor vendor = 1;

  // GPU model (known models mapped to enum, or UNSPECIFIED for unknown)
  GPUModel model = 2;

  // Raw model name string from the driver (for display when model is UNSPECIFIED)
  string model_name = 3;

  // PCI address (e.g., "0000:0b:00.0")
  string pci_address = 4;

  // Driver version (e.g., "570.86.15")
  string driver_version = 5;

  // CUDA version (e.g., "12.7") — NVIDIA only
  string cuda_version = 6;

  // VRAM in bytes (when available)
  int64 vram_bytes = 7;
}

// GetSystemInfoRequest is the request to get system information
message GetSystemInfoRequest {}

// GetSystemInfoResponse is the response from getting system information
message GetSystemInfoResponse {
  // System information (local/primary backend)
  SystemInfo info = 1;

  // System information from peer backends (tunnel-connected)
  repeated SystemInfo peers = 2;
}

// GetLatestReleaseRequest is the request for the latest-release check.
message GetLatestReleaseRequest {}

// GetLatestReleaseResponse reports the latest published release vs the
// running daemon version. See #354.
message GetLatestReleaseResponse {
  // Latest release tag from GitHub (e.g. "v0.21.2"). Empty when the lookup
  // hasn't succeeded yet (e.g. rate-limited with no cached value).
  string latest_release = 1;

  // This daemon's running version (e.g. "0.21.0").
  string current_version = 2;

  // True when latest_release is a newer semver than current_version.
  bool update_available = 3;
}

// ValidateGPURequest asks a backend to prove GPU passthrough works from inside
// an LXC. See #316.
message ValidateGPURequest {
  // Backend to validate. Empty = the local/primary daemon's own host.
  string backend_id = 1;

  // Specific GPU PCI address (e.g. "0000:01:00.0"). Empty = pass through all
  // GPUs. Prefer PCI over a DRM index — it's stable across kernel upgrades.
  string pci = 2;
}

// ValidateGPUResponse reports whether the GPU is usable from inside an LXC on
// the backend: the daemon launches a throwaway nvidia.runtime LXC, runs
// nvidia-smi inside, tears it down, and returns the parsed model + driver.
message ValidateGPUResponse {
  enum GPUStatus {
    GPU_STATUS_UNSPECIFIED = 0;
    GPU_STATUS_OK = 1;          // nvidia-smi saw the GPU inside the LXC
    GPU_STATUS_UNAVAILABLE = 2; // no GPU / passthrough not visible / setup failed
    GPU_STATUS_DEGRADED = 3;    // reserved (e.g. present but reporting errors)
  }

  GPUStatus status = 1;
  string gpu_model = 2;      // e.g. "NVIDIA GeForce RTX 3090"
  string driver_version = 3; // e.g. "570.211.01"
  string detail = 4;         // populated when status != OK
  string backend_id = 5;     // echoes the validated backend ("" = local)
}

// NetworkPolicyMode controls whether a tenant's network policy is enforced or
// only observed. Phase A ships log_only; Phase B flips to enforce. See
// docs/security/NETWORK-ISOLATION-DESIGN.md (#315).
enum NetworkPolicyMode {
  NETWORK_POLICY_MODE_UNSPECIFIED = 0; // treated as LOG_ONLY in Phase A
  NETWORK_POLICY_MODE_LOG_ONLY = 1;    // observe + audit denied flows; drop nothing
  NETWORK_POLICY_MODE_ENFORCE = 2;     // actually drop denied flows
}

// NetworkPolicy is a tenant's network-isolation policy, enforced at each of the
// tenant's container host-veth TC_INGRESS hooks (the sender side of every flow;
// see the Phase 0 findings in NETWORK-ISOLATION-DESIGN.md). #315.
message NetworkPolicy {
  // Tenant this policy applies to (required).
  string tenant = 1;

  // Allow container↔container traffic within the same tenant. When false, even
  // same-tenant peers can't reach each other.
  bool allow_intra_tenant = 2;

  // Allowed egress destination CIDRs (e.g. "10.0.0.0/8", "1.2.3.4/32").
  repeated string egress_cidrs = 3;

  // Allowed egress domains (e.g. "api.github.com"); the daemon resolves these
  // to CIDRs on a refresh loop and folds them into the egress allow set.
  repeated string egress_domains = 4;

  // Enforcement mode. Unspecified is treated as LOG_ONLY in Phase A.
  NetworkPolicyMode mode = 5;
}

// --- NetworkPolicyService request/response messages (#315) ---

message SetNetworkPolicyRequest {
  NetworkPolicy policy = 1;
}
message SetNetworkPolicyResponse {
  // The stored policy (echoed back in its normalized form).
  NetworkPolicy policy = 1;
}

message GetNetworkPolicyRequest {
  string tenant = 1;
}
message GetNetworkPolicyResponse {
  NetworkPolicy policy = 1;
}

message ListNetworkPoliciesRequest {}
message ListNetworkPoliciesResponse {
  repeated NetworkPolicy policies = 1;
}

message DeleteNetworkPolicyRequest {
  string tenant = 1;
}
message DeleteNetworkPolicyResponse {}

// BackendType represents the type of backend instance
enum BackendType {
  BACKEND_TYPE_UNSPECIFIED = 0;
  BACKEND_TYPE_GCP = 1;
  BACKEND_TYPE_TUNNEL = 2;
}

// BackendInfo describes one backend in the fleet — the local daemon
// plus any tunnel-connected peers. Emitted by ListBackends (GET
// /v1/backends). The field shape is the wire contract the CLI and MCP
// clients consume; it supersedes the hand-coded /v1/backends handler
// this RPC replaced (see #354).
message BackendInfo {
  // Unique backend identifier (e.g., "gcp-spot", "tunnel-node-a").
  string id = 1;

  // Backend kind: "local" for this daemon, "tunnel" for a peer.
  string type = 2;

  // Whether the backend is currently healthy / reachable.
  bool healthy = 3;

  // Containarium daemon version running on this backend (e.g. "0.21.0").
  string version = 4;

  // Hostname of the backend.
  string hostname = 5;

  // Seconds this backend has been up (local backend only).
  int64 uptime_seconds = 6;

  // RFC3339 timestamp this backend was last seen (peers).
  string last_seen_at = 7;

  // Operating-system string of the backend.
  string os = 8;

  // Number of containers currently running on this backend.
  int32 container_count = 9;

  // GPUs present on this backend.
  repeated BackendGPU gpus = 10;
}

// BackendGPU describes one GPU on a backend.
message BackendGPU {
  // GPU vendor string (e.g. "GPU_VENDOR_NVIDIA").
  string vendor = 1;

  // Human-readable GPU model name.
  string model_name = 2;

  // Total VRAM in bytes.
  int64 vram_bytes = 3;
}

// ListBackendsRequest is the request to list available backends
message ListBackendsRequest {}

// ListBackendsResponse is the response from listing backends
message ListBackendsResponse {
  // List of available backends
  repeated BackendInfo backends = 1;
}
