syntax = "proto3";

package containarium.v1;

import "containarium/v1/container.proto";
import "containarium/v1/config.proto";
import "containarium/v1/app.proto";
import "containarium/v1/network.proto";
import "containarium/v1/alert.proto";
import "containarium/v1/secrets.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/footprintai/containarium/pkg/pb/containarium/v1;containariumv1";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Containarium API";
    version: "1.0";
    description: "Container management API for LXC-based development environments. Provides both gRPC and REST interfaces for managing containers, SSH keys, and system resources.";
    contact: {
      name: "Containarium";
      url: "https://github.com/footprintai/containarium";
    };
    license: {
      name: "Apache 2.0";
      url: "https://github.com/footprintai/containarium/blob/main/LICENSE";
    };
  };
  schemes: HTTPS;
  schemes: HTTP;
  consumes: "application/json";
  produces: "application/json";
  security_definitions: {
    security: {
      key: "bearer";
      value: {
        type: TYPE_API_KEY;
        in: IN_HEADER;
        name: "Authorization";
        description: "Bearer token authentication. Format: 'Bearer <token>'";
      }
    }
  };
  security: {
    security_requirement: {
      key: "bearer";
      value: {};
    }
  };
};

// ContainerService provides container management operations
service ContainerService {
  // CreateContainer creates a new container for a user
  rpc CreateContainer(CreateContainerRequest) returns (CreateContainerResponse) {
    option (google.api.http) = {
      post: "/v1/containers"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create a new container";
      description: "Creates a new LXC container with specified resources and configuration. The container will be started automatically after creation.";
      tags: "Containers";
    };
  }

  // ListContainers lists all containers with optional filtering
  rpc ListContainers(ListContainersRequest) returns (ListContainersResponse) {
    option (google.api.http) = {
      get: "/v1/containers"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List all containers";
      description: "Returns a list of containers with optional filtering by state, username, or labels. Use query parameters to filter results.";
      tags: "Containers";
    };
  }

  // GetContainer gets detailed information about a specific container
  rpc GetContainer(GetContainerRequest) returns (GetContainerResponse) {
    option (google.api.http) = {
      get: "/v1/containers/{username}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get container details";
      description: "Returns detailed information about a specific container including state, resources, network info, and current metrics.";
      tags: "Containers";
    };
  }

  // DebugContainer reports diagnostic information about a container's
  // SSH path: state, host user, shell, recent sshd rejections.
  rpc DebugContainer(DebugContainerRequest) returns (DebugContainerResponse) {
    option (google.api.http) = {
      get: "/v1/containers/{username}/debug"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Debug a container's SSH path";
      description: "Inspects backend-local state for the container: container runtime state, host /etc/passwd entry, whether the shell wrapper exists, and recent sshd journal lines matching the username. Returns a structured diagnosis with likely_cause and ordered next_actions for the caller to apply.";
      tags: "Containers";
    };
  }

  // DeleteContainer deletes a container
  rpc DeleteContainer(DeleteContainerRequest) returns (DeleteContainerResponse) {
    option (google.api.http) = {
      delete: "/v1/containers/{username}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Delete a container";
      description: "Permanently deletes a container. Use force=true query parameter to delete running containers.";
      tags: "Containers";
    };
  }

  // StartContainer starts a stopped container
  rpc StartContainer(StartContainerRequest) returns (StartContainerResponse) {
    option (google.api.http) = {
      post: "/v1/containers/{username}/start"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Start a container";
      description: "Starts a stopped container. The container must exist and be in STOPPED state.";
      tags: "Container Operations";
    };
  }

  // StopContainer stops a running container
  rpc StopContainer(StopContainerRequest) returns (StopContainerResponse) {
    option (google.api.http) = {
      post: "/v1/containers/{username}/stop"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Stop a container";
      description: "Gracefully stops a running container with optional timeout and force parameters. The container can be started again later.";
      tags: "Container Operations";
    };
  }

  // ResizeContainer dynamically adjusts container resources
  rpc ResizeContainer(ResizeContainerRequest) returns (ResizeContainerResponse) {
    option (google.api.http) = {
      put: "/v1/containers/{username}/resize"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Resize container resources";
      description: "Dynamically adjusts CPU, memory, and disk resources without container restart. Disk can only be increased, not decreased.";
      tags: "Container Operations";
    };
  }

  // MoveContainer migrates a container from the local daemon (source)
  // to a peer daemon (target) using pre-copy snapshot + delta refresh.
  // Three phases: (1) initial snapshot copy while source keeps running,
  // (2) iterative delta refreshes to shrink the dirty set, (3) brief
  // stop + final delta + start-on-target + route swap. Downtime is
  // sub-second on quiet workloads with ZFS/btrfs storage; minutes
  // for active workloads on dir-pool. Prereq: incus remotes
  // configured both ways between the source and target VMs.
  rpc MoveContainer(MoveContainerRequest) returns (MoveContainerResponse) {
    option (google.api.http) = {
      post: "/v1/containers/{username}/move"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Migrate container to peer daemon";
      description: "Pre-copy snapshot-based migration to a peer daemon. Sub-second downtime on ZFS/btrfs storage with low write rate; up to minutes on dir-pool or active workloads. Caller must have incus remotes configured both directions between the source and target hosts.";
      tags: "Container Operations";
    };
  }

  // AdoptMigratedContainer is the destination-side helper RPC called by
  // a peer's MoveContainer after `incus copy` has pushed the LXC to
  // this daemon. It registers the container with this daemon's state
  // (host user, route record at the new IP) so the LXC is fully
  // operational under Containarium's API surface, then returns the
  // container's new local IP for the caller to wire into the route
  // store cutover. Internal use only — operators don't call this.
  rpc AdoptMigratedContainer(AdoptMigratedContainerRequest) returns (AdoptMigratedContainerResponse) {
    option (google.api.http) = {
      post: "/v1/containers/{username}/adopt"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Adopt a migrated container (internal)";
      description: "Called by the source daemon during MoveContainer after the LXC has been Incus-copied to this host. Registers the container's host-side accounts and route record so it's fully under Containarium's control. Not intended for direct operator use.";
      tags: "Container Operations";
    };
  }

  // ToggleMonitoring enables or disables application-emitted OTel
  // on an existing container without recreate. When enabling, the
  // daemon stamps OTEL_EXPORTER_OTLP_ENDPOINT and related env vars
  // pointing at this VM's core OTel collector LXC, then restarts
  // the container so the new env reaches the app process. When
  // disabling, the four OTEL_* env vars are unset and the container
  // is restarted so the SDK falls back to its built-in "no endpoint,
  // buffer + drop" behavior. Requires the daemon to be wired with
  // a collector endpoint (--otel-collector-endpoint or auto-ensured
  // core collector); without one, enabling fails with
  // FAILED_PRECONDITION rather than silently writing dead env vars.
  rpc ToggleMonitoring(ToggleMonitoringRequest) returns (ToggleMonitoringResponse) {
    option (google.api.http) = {
      post: "/v1/containers/{username}/monitoring"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Enable or disable OTel monitoring on a container";
      description: "Live-flip OTEL_EXPORTER_OTLP_ENDPOINT and related env vars on an existing container and restart it so the change reaches the app. Use this to retrofit monitoring onto containers created before --monitoring was wired into create_container.";
      tags: "Container Operations";
    };
  }

  // ToggleAutoSleep opts a container into manual auto-sleep tracking
  // (Phase 1 of the serverless feature). Writes the per-container
  // Incus user.* metadata keys; does NOT itself sleep or wake the
  // container. The Phase 2 ticker (auto-sleep daemon) and Phase 3
  // HTTP wake proxy are separate work — this RPC only sets the flag
  // they will consume.
  rpc ToggleAutoSleep(ToggleAutoSleepRequest) returns (ToggleAutoSleepResponse) {
    option (google.api.http) = {
      post: "/v1/containers/{username}/auto-sleep"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Enable or disable auto-sleep on a container";
      description: "Writes the per-container auto-sleep opt-in metadata (Incus user.* keys). Does not itself stop the container — use stop_container for that. Phase 2 (the actual idle-tick) and Phase 3 (wake-on-HTTP) consume this flag.";
      tags: "Container Operations";
    };
  }

  // SetContainerTTL schedules or clears a container's auto-delete time.
  // duration_seconds == 0 clears any existing TTL; > 0 sets
  // ttl_expires_at to now() + duration. duration_seconds is capped at
  // 604800 (7 days); larger values return InvalidArgument. Mirrors
  // the 168h ceiling enforced by the `containarium ttl set` CLI
  // (PR #297) — see internal/ttlsweeper for the consumer side.
  //
  // The daemon-side handler is not yet implemented; this scaffold PR
  // adds the proto + sweeper decision logic only. Until the wiring PR
  // lands, calls return Unimplemented and the CLI degrades to a
  // graceful no-op (per PR #297).
  rpc SetContainerTTL(SetContainerTTLRequest) returns (SetContainerTTLResponse) {
    option (google.api.http) = {
      post: "/v1/containers/{name}/ttl"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Schedule or clear a container's auto-delete TTL";
      description: "Stamps the container with a wall-clock auto-delete time consumed by the daemon's TTL sweeper. duration_seconds=0 clears any existing TTL; > 0 sets it to now()+duration. Capped at 604800 (7 days). Used by the containarium-run GitHub Action to auto-clean failed-CI debug boxes.";
      tags: "Container Operations";
    };
  }

  // AddSSHKey adds an SSH public key to a container
  rpc AddSSHKey(AddSSHKeyRequest) returns (AddSSHKeyResponse) {
    option (google.api.http) = {
      post: "/v1/containers/{username}/ssh-keys"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Add SSH key";
      description: "Adds an SSH public key to a container's authorized_keys file, allowing SSH access with the corresponding private key.";
      tags: "SSH Management";
    };
  }

  // RemoveSSHKey removes an SSH public key from a container
  rpc RemoveSSHKey(RemoveSSHKeyRequest) returns (RemoveSSHKeyResponse) {
    option (google.api.http) = {
      delete: "/v1/containers/{username}/ssh-keys/{ssh_public_key}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Remove SSH key";
      description: "Removes an SSH public key from a container's authorized_keys file, revoking SSH access for that key. The ssh_public_key should be URL-encoded.";
      tags: "SSH Management";
    };
  }

  // AddCollaborator adds a collaborator to a container
  rpc AddCollaborator(AddCollaboratorRequest) returns (AddCollaboratorResponse) {
    option (google.api.http) = {
      post: "/v1/containers/{owner_username}/collaborators"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Add collaborator";
      description: "Adds a collaborator to a container. The collaborator can SSH via ProxyJump and sudo su to the container owner with full session logging for audit trail.";
      tags: "Collaborators";
    };
  }

  // RemoveCollaborator removes a collaborator from a container
  rpc RemoveCollaborator(RemoveCollaboratorRequest) returns (RemoveCollaboratorResponse) {
    option (google.api.http) = {
      delete: "/v1/containers/{owner_username}/collaborators/{collaborator_username}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Remove collaborator";
      description: "Removes a collaborator's access to a container, deleting both jump server and container accounts.";
      tags: "Collaborators";
    };
  }

  // ListCollaborators lists all collaborators for a container
  rpc ListCollaborators(ListCollaboratorsRequest) returns (ListCollaboratorsResponse) {
    option (google.api.http) = {
      get: "/v1/containers/{owner_username}/collaborators"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List collaborators";
      description: "Returns all collaborators with access to a container.";
      tags: "Collaborators";
    };
  }

  // GetMetrics gets runtime metrics for containers
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse) {
    option (google.api.http) = {
      get: "/v1/metrics"
      additional_bindings {
        get: "/v1/metrics/{username}"
      }
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get container metrics";
      description: "Returns runtime metrics (CPU, memory, disk, network usage) for containers. Specify username to get metrics for a specific container, or omit to get all containers.";
      tags: "Monitoring";
    };
  }

  // CleanupDisk frees disk space inside a container by removing temp files, package caches, and old logs
  rpc CleanupDisk(CleanupDiskRequest) returns (CleanupDiskResponse) {
    option (google.api.http) = {
      post: "/v1/containers/{username}/cleanup-disk"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Clean up container disk space";
      description: "Frees disk space inside a container by removing temporary files, package manager caches, and trimming journal logs. Useful when disk is full and resize fails.";
      tags: "Container Operations";
    };
  }

  // InstallStack installs a software stack or base script on a running container
  rpc InstallStack(InstallStackRequest) returns (InstallStackResponse) {
    option (google.api.http) = {
      post: "/v1/containers/{username}/install-stack"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Install a software stack on a container";
      description: "Installs a pre-configured software stack or base script on an existing running container.";
      tags: "Container Operations";
    };
  }

  // ListStacks returns all available software stacks and their parameter schemas.
  // Used by the web UI to render the Create Container form's stack dropdown
  // and dynamically-shown parameter inputs.
  rpc ListStacks(ListStacksRequest) returns (ListStacksResponse) {
    option (google.api.http) = {
      get: "/v1/stacks"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List available software stacks";
      description: "Returns all configured software stacks including their parameters (name, type, default, etc.) for rendering the Create Container form.";
      tags: "Container Operations";
    };
  }

  // GetSystemInfo gets information about the Incus host
  rpc GetSystemInfo(GetSystemInfoRequest) returns (GetSystemInfoResponse) {
    option (google.api.http) = {
      get: "/v1/system/info"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get system information";
      description: "Returns information about the host system including Incus version, available resources, and container counts.";
      tags: "System";
    };
  }

  // ListBackends returns the cluster topology — the local daemon plus any
  // tunnel-connected peers — with per-backend health, version, OS, running
  // container count, and GPU inventory. Admin-only: the response discloses
  // fleet topology (peer IDs, hostnames, GPU inventory), which is operator-
  // grade, not tenant-grade. This replaces the former hand-coded
  // /v1/backends HTTP handler with the proto-first, gateway-generated
  // contract (proto-first convention; #354).
  rpc ListBackends(ListBackendsRequest) returns (ListBackendsResponse) {
    option (google.api.http) = {
      get: "/v1/backends"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List backends";
      description: "Lists every backend in the fleet (local daemon + tunnel peers) with health, version, OS, running container count, and GPU inventory. Admin-only — discloses fleet topology.";
      tags: "System";
    };
  }

  // GetLatestRelease reports the latest Containarium release on GitHub vs the
  // running version, so operators see "update available" without SSHing in.
  // The GitHub lookup is cached server-side (1h) to spare the rate limit. #354.
  rpc GetLatestRelease(GetLatestReleaseRequest) returns (GetLatestReleaseResponse) {
    option (google.api.http) = {
      get: "/v1/releases/latest"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get latest release";
      description: "Returns the latest Containarium release tag from GitHub (cached) alongside this daemon's running version and whether an update is available.";
      tags: "System";
    };
  }

  // ValidateGPU proves GPU passthrough works from inside an LXC on a backend:
  // the daemon launches a throwaway nvidia.runtime LXC, runs nvidia-smi inside,
  // tears it down, and returns the parsed model + driver. Admin-only; the check
  // creates and deletes a short-lived container. See #316.
  rpc ValidateGPU(ValidateGPURequest) returns (ValidateGPUResponse) {
    option (google.api.http) = {
      post: "/v1/validate-gpu"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Validate GPU passthrough";
      description: "Launches a throwaway nvidia.runtime LXC on the backend, runs nvidia-smi inside, and returns whether the GPU is usable (status, model, driver). Admin-only.";
      tags: "System";
    };
  }

  // TriggerUpgrade upgrades a backend's daemon now rather than waiting for the
  // periodic auto-update tick: the daemon pulls the binary the sentinel
  // currently serves (SHA-verified), smoke-tests it, swaps atomically (keeping
  // .old), and restarts. Admin-only. Async — poll GetUpgradeStatus or watch the
  // version in ListBackends. backend_id in the body, empty = local. #354 Phase B.
  rpc TriggerUpgrade(TriggerUpgradeRequest) returns (TriggerUpgradeResponse) {
    option (google.api.http) = {
      post: "/v1/backends/upgrade"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Trigger daemon upgrade on a backend";
      description: "Upgrades a backend's daemon to the binary the sentinel currently serves, immediately instead of on the periodic tick. SHA-verified and smoke-tested before an atomic swap; the daemon restarts. Admin-only. Returns an upgrade_id for GetUpgradeStatus.";
      tags: "System";
    };
  }

  // GetUpgradeStatus polls an upgrade started by TriggerUpgrade. A local
  // self-upgrade restarts the daemon and loses in-memory job state, so after a
  // restart this returns "unknown" — compare the backend version in
  // ListBackends instead. #354.
  rpc GetUpgradeStatus(GetUpgradeStatusRequest) returns (GetUpgradeStatusResponse) {
    option (google.api.http) = {
      get: "/v1/upgrades/{upgrade_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Poll upgrade status";
      description: "Returns the status of an upgrade started by TriggerUpgrade. Note: a local self-upgrade restarts the daemon and drops job state, returning 'unknown' afterward; compare the backend version in ListBackends to confirm.";
      tags: "System";
    };
  }

  // GetMonitoringInfo gets monitoring configuration (Grafana/VictoriaMetrics URLs)
  rpc GetMonitoringInfo(GetMonitoringInfoRequest) returns (GetMonitoringInfoResponse) {
    option (google.api.http) = {
      get: "/v1/system/monitoring"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get monitoring information";
      description: "Returns monitoring configuration including Grafana and VictoriaMetrics URLs. Used by the web UI to embed the Grafana dashboard.";
      tags: "Monitoring";
    };
  }

  // CreateAlertRule creates a new custom alert rule
  rpc CreateAlertRule(CreateAlertRuleRequest) returns (CreateAlertRuleResponse) {
    option (google.api.http) = {
      post: "/v1/alerts"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create alert rule";
      description: "Creates a new custom alert rule. The rule is persisted in PostgreSQL and synced to vmalert for evaluation.";
      tags: "Alerts";
    };
  }

  // ListAlertRules lists all alert rules
  rpc ListAlertRules(ListAlertRulesRequest) returns (ListAlertRulesResponse) {
    option (google.api.http) = {
      get: "/v1/alerts"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List alert rules";
      description: "Returns all custom alert rules stored in the database.";
      tags: "Alerts";
    };
  }

  // GetAlertRule gets a single alert rule by ID
  rpc GetAlertRule(GetAlertRuleRequest) returns (GetAlertRuleResponse) {
    option (google.api.http) = {
      get: "/v1/alerts/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get alert rule";
      description: "Returns a single alert rule by its ID.";
      tags: "Alerts";
    };
  }

  // UpdateAlertRule updates an existing alert rule
  rpc UpdateAlertRule(UpdateAlertRuleRequest) returns (UpdateAlertRuleResponse) {
    option (google.api.http) = {
      put: "/v1/alerts/{id}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Update alert rule";
      description: "Updates an existing alert rule. Changes are synced to vmalert automatically.";
      tags: "Alerts";
    };
  }

  // DeleteAlertRule deletes an alert rule
  rpc DeleteAlertRule(DeleteAlertRuleRequest) returns (DeleteAlertRuleResponse) {
    option (google.api.http) = {
      delete: "/v1/alerts/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Delete alert rule";
      description: "Deletes an alert rule by ID. The rule is removed from both the database and vmalert.";
      tags: "Alerts";
    };
  }

  // GetAlertingInfo gets alerting system status and configuration
  rpc GetAlertingInfo(GetAlertingInfoRequest) returns (GetAlertingInfoResponse) {
    option (google.api.http) = {
      get: "/v1/system/alerting"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get alerting information";
      description: "Returns alerting system status including vmalert and Alertmanager health, webhook configuration, and rule counts.";
      tags: "Alerts";
    };
  }

  // ListDefaultAlertRules lists the built-in default alert rules
  rpc ListDefaultAlertRules(ListDefaultAlertRulesRequest) returns (ListDefaultAlertRulesResponse) {
    option (google.api.http) = {
      get: "/v1/alerts/defaults"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List default alert rules";
      description: "Returns the built-in default alert rules for system and container monitoring. These rules are always active and cannot be modified.";
      tags: "Alerts";
    };
  }

  // UpdateAlertingConfig updates alerting system configuration (webhook URL)
  rpc UpdateAlertingConfig(UpdateAlertingConfigRequest) returns (UpdateAlertingConfigResponse) {
    option (google.api.http) = {
      put: "/v1/system/alerting"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Update alerting configuration";
      description: "Updates the alerting system configuration, such as the webhook URL for notifications. Changes take effect immediately.";
      tags: "Alerts";
    };
  }

  // TestWebhook sends a test notification to the configured webhook with current system status
  rpc TestWebhook(TestWebhookRequest) returns (TestWebhookResponse) {
    option (google.api.http) = {
      post: "/v1/system/alerting/test"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Test webhook";
      description: "Sends a test alert notification to the configured webhook URL with current system status information.";
      tags: "Alerts";
    };
  }

  // ListWebhookDeliveries lists webhook delivery history
  rpc ListWebhookDeliveries(ListWebhookDeliveriesRequest) returns (ListWebhookDeliveriesResponse) {
    option (google.api.http) = {
      get: "/v1/system/alerting/deliveries"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List webhook deliveries";
      description: "Returns the history of webhook delivery attempts including success/failure status, HTTP codes, and timing.";
      tags: "Alerts";
    };
  }

  // SetSecret creates or updates a tenant secret. Idempotent —
  // repeated calls with the same (username, name) bump the version
  // and replace the value. See docs/SECRETS-MANAGEMENT-DESIGN.md.
  rpc SetSecret(SetSecretRequest) returns (SetSecretResponse) {
    option (google.api.http) = {
      post: "/v1/secrets"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create or update a tenant secret";
      description: "Encrypts the value with the daemon's master key and stores it in Postgres. Idempotent: same (username, name) bumps version. The value is never logged. Name must match ^[A-Z_][A-Z0-9_]*$ up to 128 chars; value max 64 KiB.";
      tags: "Secrets";
    };
  }

  // GetSecret reads a single secret's plaintext value. Always
  // audit-logged. Admin JWT required (v1).
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse) {
    option (google.api.http) = {
      get: "/v1/secrets/{username}/{name}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Read a single tenant secret";
      description: "Returns the decrypted plaintext value. Audit-logged. Caller's responsibility to keep the value safe once it's on the wire.";
      tags: "Secrets";
    };
  }

  // ListSecrets enumerates a tenant's secrets, metadata only —
  // names + versions + timestamps. Never returns values.
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse) {
    option (google.api.http) = {
      get: "/v1/secrets/{username}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List tenant secrets (metadata only)";
      description: "Returns name/version/timestamp tuples. Values are only readable via GetSecret per-name (audit-logged).";
      tags: "Secrets";
    };
  }

  // DeleteSecret removes a secret. Does not auto-clean env-var
  // stamps on running containers — caller invokes RefreshSecrets
  // separately if needed.
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse) {
    option (google.api.http) = {
      delete: "/v1/secrets/{username}/{name}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Delete a tenant secret";
      description: "Removes the secret from Postgres. Does NOT cascade to env-var stamps on running containers — call RefreshSecrets to re-stamp without restarting.";
      tags: "Secrets";
    };
  }

  // RefreshSecrets re-stamps the LXC's environment.<NAME> config
  // keys from the current secret-store state for the tenant.
  // Running processes don't pick up the new env (POSIX semantics);
  // useful after rotation when the next exec'd process should see
  // the new value without a full container restart.
  rpc RefreshSecrets(RefreshSecretsRequest) returns (RefreshSecretsResponse) {
    option (google.api.http) = {
      post: "/v1/secrets/{username}/refresh"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Re-stamp tenant secrets into the LXC env";
      description: "Reads all of the tenant's secrets from the DB, decrypts, and updates the LXC's environment.<NAME> config keys to match. Running processes keep their old env (POSIX); new execs see the refreshed values.";
      tags: "Secrets";
    };
  }
}
