# Containarium Stack Definitions
# These stacks define pre-configured software environments that can be
# installed in containers during creation.
#
# For RHEL/Rocky Linux 9 support, stacks can include rhel_pre_install,
# rhel_packages, and rhel_post_install fields. When running on RHEL family,
# these override the default (Debian) fields. If not provided, the default
# fields are used as-is (only works if the commands are OS-agnostic).

# Base scripts are root-only system hardening scripts applied to every new container.
# Unlike stacks, post_install commands run as root (not as user).
base_scripts:
  - id: ntp
    name: Timezone Setup
    description: Set timezone to Asia/Taipei (NTP is inherited from host in LXC containers)
    packages: []
    pre_install:
      - "timedatectl set-timezone Asia/Taipei"
    post_install: []

stacks:
  - id: nodejs
    name: Node.js Development
    description: Node.js LTS with popular package managers
    icon: nodejs
    packages:
      - nodejs
      - npm
    rhel_packages:
      - nodejs
      - npm
    post_install:
      - npm install -g yarn pnpm typescript ts-node

  - id: python
    name: Python Development
    description: Python 3 with pip, virtualenv, and poetry
    icon: python
    packages:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
    rhel_packages:
      - python3
      - python3-pip
      - python3-devel
    post_install:
      - pip3 install --upgrade pip
      - pip3 install virtualenv poetry pipenv

  - id: golang
    name: Go Development
    description: Go programming language with tools
    icon: golang
    packages:
      - golang-go
    rhel_packages:
      - golang
    post_install:
      - go install golang.org/x/tools/gopls@latest
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

  - id: rust
    name: Rust Development
    description: Rust programming language with cargo
    icon: rust
    packages: []
    post_install:
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - echo 'source $HOME/.cargo/env' >> ~/.bashrc

  - id: datascience
    name: Data Science
    description: Python with Jupyter, pandas, numpy, and ML libraries
    icon: jupyter
    packages:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
    rhel_packages:
      - python3
      - python3-pip
      - python3-devel
    post_install:
      - pip3 install --upgrade pip
      - pip3 install jupyter jupyterlab pandas numpy matplotlib scikit-learn

  - id: devops
    name: DevOps Tools
    description: Kubernetes, Terraform, and infrastructure tools
    icon: kubernetes
    packages:
      - apt-transport-https
      - ca-certificates
      - gnupg
    rhel_packages:
      - ca-certificates
      - gnupg2
    post_install:
      - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      - echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /' | tee /etc/apt/sources.list.d/kubernetes.list
      - apt-get update && apt-get install -y kubectl
      - curl -fsSL https://releases.hashicorp.com/terraform/1.7.0/terraform_1.7.0_linux_amd64.zip -o /tmp/terraform.zip && unzip /tmp/terraform.zip -d /usr/local/bin/ && rm /tmp/terraform.zip
    rhel_post_install:
      - "cat <<'REPO' > /etc/yum.repos.d/kubernetes.repo\n[kubernetes]\nname=Kubernetes\nbaseurl=https://pkgs.k8s.io/core:/stable:/v1.29/rpm/\nenabled=1\ngpgcheck=1\ngpgkey=https://pkgs.k8s.io/core:/stable:/v1.29/rpm/repodata/repomd.xml.key\nREPO"
      - dnf install -y kubectl
      - curl -fsSL https://releases.hashicorp.com/terraform/1.7.0/terraform_1.7.0_linux_amd64.zip -o /tmp/terraform.zip && unzip /tmp/terraform.zip -d /usr/local/bin/ && rm /tmp/terraform.zip

  - id: database
    name: Database Clients
    description: PostgreSQL, MySQL, and Redis command-line clients
    icon: database
    packages:
      - postgresql-client
      - mysql-client
      - redis-tools
    rhel_packages:
      - postgresql
      - mysql
      - redis
    post_install: []

  - id: docker
    name: Docker Development
    description: Docker CE container runtime
    icon: docker
    pre_install:
      - "curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg"
      - "echo 'deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu jammy stable' > /etc/apt/sources.list.d/docker.list"
      - "apt-get update"
    rhel_pre_install:
      - "dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo"
    packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    rhel_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    post_install: []

  - id: fullstack
    name: Full Stack Web
    description: Node.js, Python, and database clients for web development
    icon: code
    packages:
      - nodejs
      - npm
      - python3
      - python3-pip
      - python3-venv
      - postgresql-client
      - redis-tools
    rhel_packages:
      - nodejs
      - npm
      - python3
      - python3-pip
      - postgresql
      - redis
    post_install:
      - npm install -g yarn typescript
      - pip3 install --upgrade pip virtualenv

  - id: gpu
    name: GPU / CUDA Development
    description: NVIDIA drivers, CUDA toolkit, cuDNN, and container toolkit for GPU workloads
    icon: gpu
    pre_install:
      # Install NVIDIA userspace utilities (matches host driver version)
      - "apt-get install -y nvidia-utils-570"
      # Add NVIDIA CUDA repository
      - "curl -fsSL https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb -o /tmp/cuda-keyring.deb && dpkg -i /tmp/cuda-keyring.deb && rm /tmp/cuda-keyring.deb"
      - "apt-get update"
    rhel_pre_install:
      - "dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel9/x86_64/cuda-rhel9.repo"
      - "dnf install -y nvidia-utils-570"
    packages:
      - cuda-toolkit
      - libcudnn9-cuda-12
    rhel_packages:
      - cuda-toolkit
      - libcudnn9-cuda-12
    post_install:
      - echo 'export PATH=/usr/local/cuda/bin:$PATH' >> ~/.bashrc
      - echo 'export LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH' >> ~/.bashrc

  - id: gpu-docker
    name: GPU + Docker (CUDA)
    description: NVIDIA CUDA, Docker CE with nvidia-container-toolkit for GPU containers
    icon: gpu
    pre_install:
      # NVIDIA userspace
      - "apt-get install -y nvidia-utils-570"
      # CUDA repo
      - "curl -fsSL https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb -o /tmp/cuda-keyring.deb && dpkg -i /tmp/cuda-keyring.deb && rm /tmp/cuda-keyring.deb"
      # Docker repo
      - "curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg"
      - "echo 'deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu noble stable' > /etc/apt/sources.list.d/docker.list"
      # NVIDIA Container Toolkit repo
      - "curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg"
      - "curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' > /etc/apt/sources.list.d/nvidia-container-toolkit.list"
      - "apt-get update"
    rhel_pre_install:
      # NVIDIA CUDA repo
      - "dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel9/x86_64/cuda-rhel9.repo"
      - "dnf install -y nvidia-utils-570"
      # Docker repo
      - "dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo"
      # NVIDIA Container Toolkit repo
      - "curl -s -L https://nvidia.github.io/libnvidia-container/stable/rpm/nvidia-container-toolkit.repo > /etc/yum.repos.d/nvidia-container-toolkit.repo"
    packages:
      - cuda-toolkit
      - libcudnn9-cuda-12
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
      - nvidia-container-toolkit
    rhel_packages:
      - cuda-toolkit
      - libcudnn9-cuda-12
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
      - nvidia-container-toolkit
    post_install:
      - echo 'export PATH=/usr/local/cuda/bin:$PATH' >> ~/.bashrc
      - echo 'export LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH' >> ~/.bashrc
