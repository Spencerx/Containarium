name: Release

on:
  push:
    tags:
      - 'v*'   # e.g. v0.16.4

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.12'

      - name: Install buf
        # `make build-release` transitively runs `make proto`, which
        # needs the buf CLI. Ubuntu runners don't have it preinstalled.
        # The .pb.go files are already committed, but the dep chain
        # still triggers buf generate; installing it satisfies that.
        run: go install github.com/bufbuild/buf/cmd/buf@latest

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Compile eBPF network-policy object (#627)
        # Builds internal/netbpf/netpolicy.bpf.o so the next `make` invocation
        # auto-enables -tags embed_bpf and bakes the object into the
        # containarium binary (operators enable it with
        # CONTAINARIUM_NETWORK_POLICY_BPF_OBJECT=embedded — no on-backend clang).
        # The runner is little-endian amd64; -target bpfel makes one object that
        # serves every little-endian backend (amd64/arm64). UAPI-only program, so
        # portable across kernel versions; the verifier still runs at load time.
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev linux-libc-dev
          make build-bpf

      - name: Build all release artifacts
        # `make build-release` builds containarium + mcp-server +
        # agent-box for linux/amd64, darwin/amd64, darwin/arm64 and
        # writes SHA256SUMS.txt. 9 binaries + 1 checksum file. The eBPF
        # object built above makes this invocation embed it (-tags embed_bpf).
        run: make build-release VERSION="${GITHUB_REF_NAME#v}"

      - name: Set up Node
        # agent-runtime is a Node/TS sibling package (the in-box agent loop);
        # `make bundle-agent-runtime` runs npm ci + tsc and tars it.
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build agent-runtime bundle
        # Produces bin/agent-runtime-bundle.tar.gz, pulled in-box by
        # scripts/install-agent-runtime.sh alongside agent-box-linux-amd64.
        run: make bundle-agent-runtime

      - name: Create release notes
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## Containarium ${{ github.ref_name }}

          The open-source, self-hostable, agent-native sandbox.

          ### Binaries

          Three binaries ship in this release:

          | Binary | Where it runs | What it does |
          |---|---|---|
          | `containarium` | The host (and your laptop, for the CLI) | The platform daemon + CLI. `create`, `list`, `expose-port`, `ssh-config`, etc. |
          | `mcp-server` | Your laptop | The platform MCP — outside-the-box admin (create_container, list_containers, expose_port, list_backends). Wire it into Claude Code / Cursor. |
          | `agent-box` | Inside each Containarium container | The in-the-box MCP — `shell_exec`, `read_file`, `write_file`, etc. Reached over stdio, typically via SSH. |

          ### Quick install (Linux host)

          ```bash
          curl -fsSL https://raw.githubusercontent.com/footprintai/containarium/main/hacks/install.sh | sudo bash
          ```

          ### Manual install (any binary, any platform)

          ```bash
          # containarium CLI / daemon (Linux x86_64 example)
          curl -L -o /usr/local/bin/containarium \
            https://github.com/footprintai/containarium/releases/download/${{ github.ref_name }}/containarium-linux-amd64
          chmod +x /usr/local/bin/containarium

          # Windows: client-only CLI (create/list/ssh/… against a remote daemon;
          # the daemon/sentinel/tunnel subcommands are Linux/macOS only)
          # PowerShell:
          #   curl.exe -L -o containarium.exe `
          #     https://github.com/footprintai/containarium/releases/download/${{ github.ref_name }}/containarium-windows-amd64.exe

          # platform MCP (your laptop, e.g. macOS arm64)
          curl -L -o /usr/local/bin/mcp-server \
            https://github.com/footprintai/containarium/releases/download/${{ github.ref_name }}/mcp-server-darwin-arm64
          chmod +x /usr/local/bin/mcp-server

          # agent-box (drop into your container image, Linux x86_64)
          curl -L -o /usr/local/bin/agent-box \
            https://github.com/footprintai/containarium/releases/download/${{ github.ref_name }}/agent-box-linux-amd64
          chmod +x /usr/local/bin/agent-box
          ```

          Verify checksums via `SHA256SUMS.txt`.

          ### MCP client setup

          Wire the platform MCP into Claude Code (`~/.claude.json`):

          ```jsonc
          {
            "mcpServers": {
              "containarium": {
                "command": "/usr/local/bin/mcp-server",
                "env": {
                  "CONTAINARIUM_SERVER_URL": "http://your-host:8080",
                  "CONTAINARIUM_JWT_TOKEN": "<your-token>"
                }
              }
            }
          }
          ```

          Wire `agent-box` for in-the-box file/shell ops:

          ```jsonc
          {
            "mcpServers": {
              "containarium-box": {
                "command": "ssh",
                "args": ["user@your-box", "agent-box"]
              }
            }
          }
          ```

          See [README.md](https://github.com/footprintai/containarium#quick-start) for the full agent-native walkthrough.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Containarium ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            bin/containarium-linux-amd64
            bin/containarium-darwin-amd64
            bin/containarium-darwin-arm64
            bin/containarium-windows-amd64.exe
            bin/mcp-server-linux-amd64
            bin/mcp-server-darwin-amd64
            bin/mcp-server-darwin-arm64
            bin/agent-box-linux-amd64
            bin/agent-box-darwin-amd64
            bin/agent-box-darwin-arm64
            bin/agent-runtime-bundle.tar.gz
            bin/SHA256SUMS.txt
          draft: false
          prerelease: false

  # Air-gapped install bundle (E3a/E3b).
  # Per prd/cloud/air-gapped-install-bundle.md, ship a self-contained
  # tarball for Tier 3 customers with no internet egress. Bundle wraps
  # the per-platform binaries above + toolchains, sidecars, .debs.
  # Runs as a parallel matrix job so the binary release isn't blocked
  # if the bundle build is slow or flaky.
  build-bundle:
    needs: build-and-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: linux, arch: amd64 }
          # arm64 disabled in v0 — `apt-get download` on an amd64 runner
          # pulls amd64 .debs by default. To produce a true arm64 bundle
          # we either need an arm64 runner (gh-hosted larger runners) or
          # cross-arch apt setup. Re-enable when one of those is in
          # place. v0 customer ask is amd64-only.
          # - { os: linux, arch: arm64 }
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.12'

      - name: Install buf
        run: go install github.com/bufbuild/buf/cmd/buf@latest

      - name: Install apt-rdepends
        # Needed by scripts/bundle/download-deps.sh to resolve transitive
        # .deb dependencies. Runner is ubuntu-latest so apt is present.
        run: sudo apt-get update && sudo apt-get install -y apt-rdepends

      - name: Compile eBPF network-policy object (#627)
        # Same as the build-and-release job: build the object first so the
        # bundle's containarium binary embeds it (-tags embed_bpf, auto-enabled
        # by the Makefile when internal/netbpf/netpolicy.bpf.o is present).
        run: |
          sudo apt-get install -y clang llvm libbpf-dev linux-libc-dev
          make build-bpf

      - name: Build per-platform binaries
        # build-bundle depends on build-release; calling explicitly so
        # the binary outputs land in bin/ before the bundle script reads
        # them. (The job above only writes binaries to the release page,
        # not to a workflow artifact; we rebuild here.)
        run: make build-release VERSION="${GITHUB_REF_NAME#v}"

      - name: Download bundle dependencies
        run: |
          make bundle-download-deps \
            BUNDLE_OS=${{ matrix.target.os }} \
            BUNDLE_ARCH=${{ matrix.target.arch }}

      - name: Build OTel sidecar (for docker-save into bundle)
        # Best-effort: if the sidecar build fails the bundle still ships,
        # just without the OTel image. Tier 3 customers can add it later.
        run: make sidecar-build-otel || true

      - name: Assemble bundle tarball
        run: |
          make build-bundle \
            BUNDLE_VERSION=${{ github.ref_name }} \
            BUNDLE_OS=${{ matrix.target.os }} \
            BUNDLE_ARCH=${{ matrix.target.arch }}

      - name: List bundle outputs
        run: ls -lh dist/

      - name: Upload bundle to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          # append_files preserves the binary release uploaded above;
          # without it, this step would overwrite the release files
          # list.
          files: |
            dist/containarium-bundle-${{ github.ref_name }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz
            dist/containarium-bundle-${{ github.ref_name }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz.sha256
          draft: false
          prerelease: false
