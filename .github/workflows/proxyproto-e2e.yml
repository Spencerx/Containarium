name: PROXY Protocol E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-default-e2e:
    name: Unit + default e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.12'

      - name: Windows client cross-compile guard
        # The release builds a client-only Windows binary (cmd/containarium for
        # GOOS=windows). It must not pull in the daemon, which imports the
        # Linux-only eBPF loader (internal/netbpf). This catches a new cmd file
        # importing internal/server without a //go:build !windows guard at PR
        # time instead of at release time (see #884 / v0.47.0).
        run: GOOS=windows GOARCH=amd64 go build -o /dev/null ./cmd/containarium/

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Web UI build guard
        # `make build-release` runs a full `next build` (with TypeScript
        # type-checking) that no PR-time job exercised — the same "only
        # caught at release time" gap as the Windows guard above, just for
        # the web UI. A prop destructure typo (#886) and two wrong-argument
        # client calls broke v0.48.0's release build (webui compiled fine in
        # `next dev`/lint, only `next build`'s full type-check caught it).
        # Same fix shape as #884/#885: run the real release build at PR time.
        working-directory: web-ui
        run: |
          npm ci
          npm run build

      - name: Run sentinel + app tests
        # The skipped tests are pre-existing failures on unprivileged Linux
        # runners (they pass on darwin where loopback aliases are no-ops).
        # Cause: tunnel_registry.addLoopbackAlias runs `ip addr add` which
        # needs root, and TestEnableForwardingOnNonLinux has no GOOS guard.
        # Unrelated to this PR; tracked for a follow-up cleanup.
        run: |
          go test -v -race -timeout 5m \
            -skip 'TestEnableForwardingOnNonLinux|TestRegisterPropagatesPool|TestTunnelIntegration|TestTunnelEndToEnd|TestConnMuxWithTunnelClient' \
            ./internal/sentinel/... ./internal/app/...

  real-caddy-e2e:
    name: Real Caddy wire-compat e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.12'

      - name: Cache built caddy binary
        id: cache-caddy
        uses: actions/cache@v6
        with:
          path: ./bin/caddy
          # Bump the suffix to invalidate the cache when bumping Caddy.
          key: caddy-${{ runner.os }}-amd64-v2-stable

      - name: Build Caddy via xcaddy
        if: steps.cache-caddy.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
          mkdir -p bin
          xcaddy build --output ./bin/caddy

      - name: Verify proxy_protocol module is present
        run: |
          set -euo pipefail
          ./bin/caddy version
          ./bin/caddy list-modules | grep -E '^caddy\.listeners\.proxy_protocol$' \
            || { echo "::error::proxy_protocol listener wrapper missing from Caddy build"; exit 1; }

      - name: Put built Caddy on PATH
        run: echo "${{ github.workspace }}/bin" >> "$GITHUB_PATH"

      - name: Run real-Caddy e2e
        run: |
          set -euo pipefail
          which caddy
          go test -v -timeout 5m \
            -tags=proxyproto_real_caddy \
            -run TestProxyProtocolE2E_RealCaddy \
            ./internal/sentinel/...
