# Containarium Stack Definitions
# These stacks define pre-configured software environments that can be
# installed in containers during creation.
#
# For RHEL/Rocky Linux 9 support, stacks can include rhel_pre_install,
# rhel_packages, and rhel_post_install fields. When running on RHEL family,
# these override the default (Debian) fields. If not provided, the default
# fields are used as-is (only works if the commands are OS-agnostic).

# Base scripts are root-only system hardening scripts applied to every new container.
# Unlike stacks, post_install commands run as root (not as user).
base_scripts:
  - id: ntp
    name: Timezone Setup
    description: Set timezone to Asia/Taipei (NTP is inherited from host in LXC containers)
    packages: []
    pre_install:
      - "timedatectl set-timezone Asia/Taipei"
    post_install: []

stacks:
  - id: nodejs
    name: Node.js Development
    description: Node.js LTS with popular package managers
    icon: nodejs
    packages:
      - nodejs
      - npm
    rhel_packages:
      - nodejs
      - npm
    post_install:
      - npm install -g yarn pnpm typescript ts-node

  - id: python
    name: Python Development
    description: Python 3 with pip, virtualenv, and poetry
    icon: python
    packages:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
    rhel_packages:
      - python3
      - python3-pip
      - python3-devel
    post_install:
      - pip3 install --upgrade pip
      - pip3 install virtualenv poetry pipenv

  - id: golang
    name: Go Development
    description: Go programming language with tools
    icon: golang
    packages:
      - golang-go
    rhel_packages:
      - golang
    post_install:
      - go install golang.org/x/tools/gopls@latest
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

  - id: rust
    name: Rust Development
    description: Rust programming language with cargo
    icon: rust
    packages: []
    post_install:
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - echo 'source $HOME/.cargo/env' >> ~/.bashrc

  - id: datascience
    name: Data Science
    description: Python with Jupyter, pandas, numpy, and ML libraries
    icon: jupyter
    packages:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
    rhel_packages:
      - python3
      - python3-pip
      - python3-devel
    post_install:
      - pip3 install --upgrade pip
      - pip3 install jupyter jupyterlab pandas numpy matplotlib scikit-learn

  - id: devops
    name: DevOps Tools
    description: Kubernetes, Terraform, and infrastructure tools
    icon: kubernetes
    packages:
      - apt-transport-https
      - ca-certificates
      - gnupg
    rhel_packages:
      - ca-certificates
      - gnupg2
    post_install:
      - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      - echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /' | tee /etc/apt/sources.list.d/kubernetes.list
      - apt-get update && apt-get install -y kubectl
      - curl -fsSL https://releases.hashicorp.com/terraform/1.7.0/terraform_1.7.0_linux_amd64.zip -o /tmp/terraform.zip && unzip /tmp/terraform.zip -d /usr/local/bin/ && rm /tmp/terraform.zip
    rhel_post_install:
      - "cat <<'REPO' > /etc/yum.repos.d/kubernetes.repo\n[kubernetes]\nname=Kubernetes\nbaseurl=https://pkgs.k8s.io/core:/stable:/v1.29/rpm/\nenabled=1\ngpgcheck=1\ngpgkey=https://pkgs.k8s.io/core:/stable:/v1.29/rpm/repodata/repomd.xml.key\nREPO"
      - dnf install -y kubectl
      - curl -fsSL https://releases.hashicorp.com/terraform/1.7.0/terraform_1.7.0_linux_amd64.zip -o /tmp/terraform.zip && unzip /tmp/terraform.zip -d /usr/local/bin/ && rm /tmp/terraform.zip

  - id: database
    name: Database Clients
    description: PostgreSQL, MySQL, and Redis command-line clients
    icon: database
    packages:
      - postgresql-client
      - mysql-client
      - redis-tools
    rhel_packages:
      - postgresql
      - mysql
      - redis
    post_install: []

  - id: docker
    name: Docker Development
    description: Docker CE container runtime
    icon: docker
    pre_install:
      - "curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg"
      - "echo 'deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu jammy stable' > /etc/apt/sources.list.d/docker.list"
      - "apt-get update"
    rhel_pre_install:
      - "dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo"
    packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    rhel_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    post_install: []

  - id: fullstack
    name: Full Stack Web
    description: Node.js, Python, and database clients for web development
    icon: code
    packages:
      - nodejs
      - npm
      - python3
      - python3-pip
      - python3-venv
      - postgresql-client
      - redis-tools
    rhel_packages:
      - nodejs
      - npm
      - python3
      - python3-pip
      - postgresql
      - redis
    post_install:
      - npm install -g yarn typescript
      - pip3 install --upgrade pip virtualenv

  - id: gpu
    name: GPU / CUDA Development
    description: NVIDIA drivers, CUDA toolkit, cuDNN, and container toolkit for GPU workloads
    icon: gpu
    pre_install:
      # Install NVIDIA userspace utilities (matches host driver version)
      - "apt-get install -y nvidia-utils-570"
      # Add NVIDIA CUDA repository
      - "curl -fsSL https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb -o /tmp/cuda-keyring.deb && dpkg -i /tmp/cuda-keyring.deb && rm /tmp/cuda-keyring.deb"
      - "apt-get update"
    rhel_pre_install:
      - "dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel9/x86_64/cuda-rhel9.repo"
      - "dnf install -y nvidia-utils-570"
    packages:
      - cuda-toolkit
      - libcudnn9-cuda-12
    rhel_packages:
      - cuda-toolkit
      - libcudnn9-cuda-12
    post_install:
      - echo 'export PATH=/usr/local/cuda/bin:$PATH' >> ~/.bashrc
      - echo 'export LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH' >> ~/.bashrc

  - id: gpu-docker
    name: GPU + Docker (CUDA)
    description: NVIDIA CUDA, Docker CE with nvidia-container-toolkit for GPU containers
    icon: gpu
    pre_install:
      # NVIDIA userspace
      - "apt-get install -y nvidia-utils-570"
      # CUDA repo
      - "curl -fsSL https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb -o /tmp/cuda-keyring.deb && dpkg -i /tmp/cuda-keyring.deb && rm /tmp/cuda-keyring.deb"
      # Docker repo
      - "curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg"
      - "echo 'deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu noble stable' > /etc/apt/sources.list.d/docker.list"
      # NVIDIA Container Toolkit repo
      - "curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg"
      - "curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' > /etc/apt/sources.list.d/nvidia-container-toolkit.list"
      - "apt-get update"
    rhel_pre_install:
      # NVIDIA CUDA repo
      - "dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel9/x86_64/cuda-rhel9.repo"
      - "dnf install -y nvidia-utils-570"
      # Docker repo
      - "dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo"
      # NVIDIA Container Toolkit repo
      - "curl -s -L https://nvidia.github.io/libnvidia-container/stable/rpm/nvidia-container-toolkit.repo > /etc/yum.repos.d/nvidia-container-toolkit.repo"
    packages:
      - cuda-toolkit
      - libcudnn9-cuda-12
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
      - nvidia-container-toolkit
    rhel_packages:
      - cuda-toolkit
      - libcudnn9-cuda-12
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
      - nvidia-container-toolkit
    post_install:
      - echo 'export PATH=/usr/local/cuda/bin:$PATH' >> ~/.bashrc
      - echo 'export LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH' >> ~/.bashrc

  - id: android
    name: Android Development (Headless)
    description: Android SDK, emulator with KVM acceleration, ADB, Gradle for headless builds and testing
    icon: android
    pre_install:
      - "apt-get install -y openjdk-17-jdk-headless unzip wget cpu-checker qemu-kvm"
      - "mkdir -p /opt/android-sdk/cmdline-tools"
      - "wget -q -O /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
      - "unzip -q /tmp/cmdline-tools.zip -d /opt/android-sdk/cmdline-tools"
      - "mv /opt/android-sdk/cmdline-tools/cmdline-tools /opt/android-sdk/cmdline-tools/latest"
      - "rm /tmp/cmdline-tools.zip"
      - "yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null 2>&1 || true"
      - "/opt/android-sdk/cmdline-tools/latest/bin/sdkmanager 'platform-tools' 'build-tools;35.0.0' 'platforms;android-35' 'emulator' 'system-images;android-35;google_apis;x86_64'"
    packages: []
    post_install:
      - echo 'export ANDROID_HOME=/opt/android-sdk' >> ~/.bashrc
      - echo 'export ANDROID_SDK_ROOT=/opt/android-sdk' >> ~/.bashrc
      - echo 'export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$PATH' >> ~/.bashrc
      - /opt/android-sdk/cmdline-tools/latest/bin/avdmanager create avd -n default -k "system-images;android-35;google_apis;x86_64" -d pixel_6 --force

  - id: android-studio
    name: Android Development (GUI)
    description: Android Studio with VNC access, emulator, full IDE for app development
    icon: android
    pre_install:
      - "apt-get install -y openjdk-17-jdk unzip wget cpu-checker qemu-kvm"
      - "apt-get install -y tigervnc-standalone-server dbus-x11 xfce4 xfce4-terminal fonts-noto"
      - "mkdir -p /opt/android-sdk/cmdline-tools"
      - "wget -q -O /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
      - "unzip -q /tmp/cmdline-tools.zip -d /opt/android-sdk/cmdline-tools"
      - "mv /opt/android-sdk/cmdline-tools/cmdline-tools /opt/android-sdk/cmdline-tools/latest"
      - "rm /tmp/cmdline-tools.zip"
      - "wget -q -O /tmp/android-studio.tar.gz https://redirector.gvt1.com/edgedl/android/studio/ide-zips/2024.3.2.16/android-studio-2024.3.2.16-linux.tar.gz"
      - "tar xzf /tmp/android-studio.tar.gz -C /opt/"
      - "rm /tmp/android-studio.tar.gz"
      - "yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null 2>&1 || true"
      - "/opt/android-sdk/cmdline-tools/latest/bin/sdkmanager 'platform-tools' 'build-tools;35.0.0' 'platforms;android-35' 'emulator' 'system-images;android-35;google_apis;x86_64'"
    packages: []
    post_install:
      - echo 'export ANDROID_HOME=/opt/android-sdk' >> ~/.bashrc
      - echo 'export ANDROID_SDK_ROOT=/opt/android-sdk' >> ~/.bashrc
      - echo 'export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:/opt/android-studio/bin:$PATH' >> ~/.bashrc
      - /opt/android-sdk/cmdline-tools/latest/bin/avdmanager create avd -n default -k "system-images;android-35;google_apis;x86_64" -d pixel_6 --force
      - mkdir -p ~/.vnc && echo "containarium" | vncpasswd -f > ~/.vnc/passwd && chmod 600 ~/.vnc/passwd
      - printf '#!/bin/bash\nstartxfce4 &\n' > ~/.vnc/xstartup && chmod +x ~/.vnc/xstartup

  - id: kind-kubeflow
    name: Kind + Kubeflow (AI Reference Platform)
    description: Full Kubeflow AI Reference Platform (26.03) on a Kind cluster — Istio, Pipelines, Notebooks, KServe, Katib, Trainer, Model Registry, Central Dashboard. Requires --podman, 16GB+ memory, 8+ CPUs, 100GB+ disk.
    icon: kubernetes
    parameters:
      - name: kubeflow_user
        label: Kubeflow Login Email
        description: Email used to log in to the Kubeflow Central Dashboard
        type: string
        default: user@example.com
      - name: kubeflow_password
        label: Kubeflow Login Password
        description: Password for the Kubeflow login (stored as a bcrypt hash in Dex)
        type: password
        default: "12341234"
        required: true
    pre_install:
      # Docker (Kind requires real Docker or Podman — we install Docker)
      # python3-passlib: generates bcrypt hashes for Dex login credentials
      #   (this is what Kubeflow's own README recommends)
      - "apt-get install -y ca-certificates curl gnupg git sudo python3-passlib"
      - "install -m 0755 -d /etc/apt/keyrings"
      - "curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc"
      - "chmod a+r /etc/apt/keyrings/docker.asc"
      - 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list'
      - "apt-get update"
      - "apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin"
      # Clone Kubeflow manifests at the 26.03 AI Reference Platform release.
      # The repo ships install scripts (tests/install_KinD_create_KinD_cluster_install_kustomize.sh)
      # that pin the right Kind, kubectl, and Kustomize versions — we defer to those at setup time
      # rather than pinning here, so upgrades are a simple `git pull`.
      - "git clone --branch 26.03 --depth 1 https://github.com/kubeflow/manifests.git /opt/kubeflow-manifests"
    packages: []
    post_install:
      # Container user needs docker group to run kind/docker without sudo
      - 'usermod -aG docker "$(logname 2>/dev/null || id -un 1000)"'
      # Give the user ownership of manifests (install script writes to $HOME/.local/bin)
      - 'chown -R "$(logname 2>/dev/null || id -un 1000):$(logname 2>/dev/null || id -un 1000)" /opt/kubeflow-manifests'
      # Persist stack parameters so setup-kubeflow can find them later. The
      # CONTAINARIUM_STACK_* env vars are only set while post_install runs;
      # the user runs setup-kubeflow interactively later (or non-interactively
      # from a CI job) when those vars are no longer present.
      - |
        sudo mkdir -p /etc/containarium
        {
          echo "# Stack parameters captured at container creation time"
          env | grep '^CONTAINARIUM_STACK_' || true
        } | sudo tee /etc/containarium/stack-params.env >/dev/null
        sudo chmod 600 /etc/containarium/stack-params.env
      # Write setup-kubeflow helper — user runs this after SSH'ing in
      - |
        cat > /usr/local/bin/setup-kubeflow <<'SCRIPT'
        #!/bin/bash
        # Creates a Kind cluster and installs the full Kubeflow AI Reference
        # Platform (26.03) using the upstream kubeflow/manifests install
        # scripts. Takes ~20-30 min.
        #
        # Customize login credentials with env vars (optional):
        #   KUBEFLOW_USER      — email, default "user@example.com"
        #   KUBEFLOW_PASSWORD  — password, default "12341234"
        #
        # Examples:
        #   setup-kubeflow
        #   KUBEFLOW_USER=me@example.com KUBEFLOW_PASSWORD=s3cret setup-kubeflow
        set -euo pipefail

        MANIFESTS_DIR="/opt/kubeflow-manifests"
        if [ ! -d "$MANIFESTS_DIR" ]; then
            echo "ERROR: $MANIFESTS_DIR not found. Re-install the kind-kubeflow stack."
            exit 1
        fi

        # Load stack parameters that were captured at container create time.
        if [ -f /etc/containarium/stack-params.env ]; then
            set -a  # auto-export anything sourced
            . /etc/containarium/stack-params.env
            set +a
        fi

        # Credentials resolve in this order:
        #   1. Explicit env vars when invoking setup-kubeflow manually
        #   2. Stack parameters set at container create time (web UI form)
        #   3. Interactive prompt when running in a TTY
        #   4. Defaults (user@example.com / 12341234)
        KUBEFLOW_USER="${KUBEFLOW_USER:-${CONTAINARIUM_STACK_kubeflow_user:-}}"
        KUBEFLOW_PASSWORD="${KUBEFLOW_PASSWORD:-${CONTAINARIUM_STACK_kubeflow_password:-}}"
        if [ -z "$KUBEFLOW_USER" ] && [ -t 0 ]; then
            read -rp "Kubeflow username (email) [user@example.com]: " KUBEFLOW_USER
        fi
        if [ -z "$KUBEFLOW_PASSWORD" ] && [ -t 0 ]; then
            read -rsp "Kubeflow password [12341234]: " KUBEFLOW_PASSWORD
            echo ""
        fi
        KUBEFLOW_USER="${KUBEFLOW_USER:-user@example.com}"
        KUBEFLOW_PASSWORD="${KUBEFLOW_PASSWORD:-12341234}"

        # 1. Patch dex configuration with the chosen credentials
        #    - Email: in common/dex/base/config-map.yaml
        #    - Password: bcrypt hash in common/dex/base/dex-passwords.yaml
        echo "==> Configuring login (user=$KUBEFLOW_USER)..."
        BCRYPT_HASH=$(python3 -c "from passlib.hash import bcrypt; import os; print(bcrypt.using(rounds=12, ident='2y').hash(os.environ['P']))" P="$KUBEFLOW_PASSWORD")
        cd "$MANIFESTS_DIR"
        # Replace email (default: user@example.com)
        sed -i "s|email: user@example.com|email: $KUBEFLOW_USER|" common/dex/base/config-map.yaml
        # Replace bcrypt hash — match the DEX_USER_PASSWORD line and substitute
        python3 -c "
        import re, os
        p = 'common/dex/base/dex-passwords.yaml'
        with open(p) as f: d = f.read()
        d = re.sub(r'DEX_USER_PASSWORD: \$2[ay]\$[0-9]+\$[A-Za-z0-9./]+',
                   'DEX_USER_PASSWORD: ' + os.environ['H'], d)
        open(p,'w').write(d)
        " H="$BCRYPT_HASH"

        # 2. Tune kernel for many pods (required by Kubeflow)
        echo "==> Tuning inotify limits..."
        sudo sysctl fs.inotify.max_user_instances=2280 fs.inotify.max_user_watches=1255360

        # 3. Install Kind + kubectl + kustomize (the manifests repo pins versions)
        #    Script installs to $HOME/.local/bin and creates a 3-node cluster.
        echo "==> Installing Kind + kubectl + kustomize and creating Kind cluster..."
        ./tests/install_KinD_create_KinD_cluster_install_kustomize.sh
        export PATH="$HOME/.local/bin:$PATH"

        # 4. Persist PATH for future shells
        grep -q '\.local/bin' "$HOME/.bashrc" 2>/dev/null || \
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$HOME/.bashrc"

        # 5. Save kubeconfig to standard location
        mkdir -p "$HOME/.kube"
        kind get kubeconfig --name kubeflow > "$HOME/.kube/config"
        chmod 600 "$HOME/.kube/config"

        # 6. Run Kubeflow's recommended install loop (retries until CRDs settle)
        echo "==> Installing full Kubeflow platform (takes 20-30 min)..."
        while ! kustomize build example | kubectl apply --server-side --force-conflicts -f -; do
            echo "  Retrying apply... (CRDs/webhooks warming up)"
            sleep 20
        done

        echo ""
        echo "==> Waiting for pods to become ready (another 5-10 min)..."
        kubectl wait --for=condition=ready pod --all --all-namespaces --timeout=1200s || {
            echo "  Some pods still not ready. Check: kubectl get pods -A"
        }

        echo ""
        echo "==> Kubeflow installed!"
        echo ""
        echo "Access the Central Dashboard:"
        echo "  kubectl port-forward -n istio-system svc/istio-ingressgateway 8080:80 --address 0.0.0.0 &"
        echo "  Then open: http://<container-ip>:8080/"
        echo ""
        echo "Login: $KUBEFLOW_USER"
        echo "(password set via KUBEFLOW_PASSWORD env var or interactive prompt)"
        SCRIPT
        chmod +x /usr/local/bin/setup-kubeflow
      # Also write a helper to change credentials after install
      - |
        cat > /usr/local/bin/kubeflow-set-password <<'SCRIPT'
        #!/bin/bash
        # Changes the Kubeflow login password on a running cluster.
        # Usage: kubeflow-set-password [new-password]
        set -euo pipefail
        export PATH="$HOME/.local/bin:$PATH"

        NEW_PASSWORD="${1:-}"
        if [ -z "$NEW_PASSWORD" ] && [ -t 0 ]; then
            read -rsp "New Kubeflow password: " NEW_PASSWORD
            echo ""
        fi
        if [ -z "$NEW_PASSWORD" ]; then
            echo "ERROR: password required"
            exit 1
        fi

        BCRYPT_HASH=$(python3 -c "from passlib.hash import bcrypt; import os; print(bcrypt.using(rounds=12, ident='2y').hash(os.environ['P']))" P="$NEW_PASSWORD")
        kubectl -n auth patch secret dex-passwords --type=json \
            -p="[{\"op\":\"replace\",\"path\":\"/stringData\",\"value\":{\"DEX_USER_PASSWORD\":\"$BCRYPT_HASH\"}}]" \
            2>/dev/null || \
        kubectl -n auth create secret generic dex-passwords \
            --from-literal="DEX_USER_PASSWORD=$BCRYPT_HASH" --dry-run=client -o yaml | \
            kubectl apply -f -
        kubectl -n auth rollout restart deployment dex
        echo "Password updated. Dex restarting — new login will work in ~30s."
        SCRIPT
        chmod +x /usr/local/bin/kubeflow-set-password
      - echo 'Tools + Kubeflow 26.03 manifests ready. Run "setup-kubeflow" to create the cluster and install. Set KUBEFLOW_USER and KUBEFLOW_PASSWORD env vars to customize login.'
