# Containarium Recipe Catalog
#
# A recipe deploys a GPU/app workload as a NEW dedicated container. The
# container is an Ubuntu LXC (with optional GPU passthrough); the recipe's
# image runs inside it via Podman in the post_start commands — the same
# pattern the kubeflow stack uses to run k3s inside an LXC.
#
# Deploy-time parameters are exported to post_start as
# CONTAINARIUM_PARAM_<UPPER_NAME> environment variables.
#
# These recipes ship in-tree and are reviewed; post_start runs with the same
# trust level as a stack's post_install. Remote/community catalogs are a
# separate, signed mechanism (not loaded here).

recipes:
  - id: ollama
    name: Ollama
    description: Run Ollama with GPU acceleration and pull a model on first boot.
    image: ollama/ollama
    requires_gpu: true
    resources:
      cpu: "8"
      memory: 16GB
      disk: 200GB
    ports:
      - container_port: 11434
        subdomain: ollama
    volumes:
      - name: ollama-models
        path: /root/.ollama
    parameters:
      - name: model
        label: Model
        description: Model to pull after the server starts (e.g. llama3, qwen2.5).
        type: string
        default: llama3
    post_start:
      - podman volume create ollama-models
      - podman run -d --name ollama --restart=always --device nvidia.com/gpu=all -p 11434:11434 -v ollama-models:/root/.ollama docker.io/ollama/ollama
      - 'podman exec ollama ollama pull "$CONTAINARIUM_PARAM_MODEL"'

  - id: llamacpp
    name: llama.cpp server
    description: Run the llama.cpp OpenAI-compatible server with CUDA, serving a HuggingFace GGUF model.
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    requires_gpu: true
    resources:
      cpu: "8"
      memory: 16GB
      disk: 100GB
    ports:
      - container_port: 8080
        subdomain: llamacpp
    volumes:
      - name: llamacpp-models
        path: /models
    parameters:
      - name: hf_repo
        label: HuggingFace GGUF repo
        description: HuggingFace repo to serve, in -hf form (e.g. ggml-org/gemma-3-1b-it-GGUF).
        type: string
        default: ggml-org/gemma-3-1b-it-GGUF
        required: true
    post_start:
      - podman volume create llamacpp-models
      - 'podman run -d --name llamacpp --restart=always --device nvidia.com/gpu=all -p 8080:8080 -v llamacpp-models:/models ghcr.io/ggml-org/llama.cpp:server-cuda -hf "$CONTAINARIUM_PARAM_HF_REPO" --host 0.0.0.0 --port 8080'

  # agent-runtime is the box an AgentSkill runs in (AgentSkillService). It is a
  # plain Ubuntu LXC; the skill's system prompt, scoped token, and task input
  # are seeded under /etc/containarium/agent by RunAgentSkill, and the in-box
  # agent loop (agent-runtime/, the Node sibling package) consumes them and
  # writes artifact.json back. No GPU and no exposed ports by default — a skill
  # that needs either declares its own box.
  #
  # post_start assembles the box (design-note open question #5, addressed via
  # the release-artifact path): install Node 20, then run
  # scripts/install-agent-runtime.sh, which pulls the agent-box binary +
  # agent-runtime bundle from the named release and installs `agent-box` +
  # `agent-runtime` onto PATH. The daemon then execs `agent-runtime` (run mode)
  # or starts serve mode; both resolve via the PATH launcher.
  #
  # `release` selects the release tag the artifacts are pulled from (built by
  # `make build-agent-box-all` + `make bundle-agent-runtime`, published to the
  # GitHub release). `repo` overrides the source repo (forks/mirrors).
  - id: agent-runtime
    name: Agent Runtime
    description: Box for running an AgentSkill — Ubuntu LXC with Node + agent-box + the in-box agent loop; reads prompt/token/input from /etc/containarium/agent and writes artifact.json.
    image: images:ubuntu/24.04
    requires_gpu: false
    resources:
      cpu: "2"
      memory: 4GB
      disk: 20GB
    parameters:
      # release is optional: the daemon passes its own version when it
      # provisions a skill's box (so artifacts match the daemon); a human
      # `recipe deploy` may pass it too. When empty (or the release lacks the
      # artifacts), assembly is skipped and the box runs without the in-box loop
      # (the daemon's exec then degrades to an empty artifact — best-effort).
      - name: release
        label: Release tag
        description: Containarium release tag to pull agent-box + the agent-runtime bundle from (e.g. v0.27.0). Empty skips assembly.
        type: string
      - name: repo
        label: Source repo
        description: GitHub owner/repo the release artifacts live in.
        type: string
        default: FootprintAI/Containarium
    post_start:
      - mkdir -p /etc/containarium/agent
      - 'curl -fsSL https://deb.nodesource.com/setup_20.x | bash -'
      - DEBIAN_FRONTEND=noninteractive apt-get install -y nodejs
      # Best-effort assembly: never fail provisioning if the release lacks the
      # artifacts (|| echo keeps the line green under `set -e`).
      - 'if [ -n "$CONTAINARIUM_PARAM_RELEASE" ]; then curl -fsSL "https://raw.githubusercontent.com/$CONTAINARIUM_PARAM_REPO/$CONTAINARIUM_PARAM_RELEASE/scripts/install-agent-runtime.sh" | REPO="$CONTAINARIUM_PARAM_REPO" RELEASE="$CONTAINARIUM_PARAM_RELEASE" bash || echo "agent-runtime assembly skipped/failed for release=$CONTAINARIUM_PARAM_RELEASE; box runs without the in-box loop"; fi'

  # agent-workspace is the HUMAN-IN-THE-LOOP chat workspace: a web chat UI
  # (Claude/ChatGPT-style) with a live preview pane and multiple persisted
  # conversations, all running inside one always-on box. Where agent-runtime is
  # headless (seeded task → artifact.json), this is a place a user sits and
  # co-works with a coding agent, then ships what they build to a separate box.
  #
  # Rather than build a chat UI + agent loop + session store from scratch, this
  # recipe packages OpenHands (https://github.com/All-Hands-AI/OpenHands, MIT)
  # as the in-box engine. OpenHands already gives us: a web chat UI, a coding
  # agent, an in-container workspace + browser/preview, multiple conversations
  # persisted to disk, and bring-your-own Anthropic key. Containarium's value is
  # the wrapper: an isolated always-on box, eBPF/audit/secrets trust fabric, and
  # one-click ship-to-box via the platform MCP. OpenHands' web port is exposed
  # as a subdomain (the `ports` block) so the whole chat+preview surface is
  # reachable in the browser; conversations live under /opt/openhands-state in
  # the box, so "all sessions stored inside a box" holds.
  #
  # The OpenHands "Agent Canvas" build runs the coding agent IN the app
  # container (the box is the sandbox) — no docker/podman socket, no separate
  # runtime image. Conversations persist to the mounted state dir, so "all
  # sessions stored inside a box" holds. Validated live on a backend
  # (2026-06-18, see docs/AGENT-WORKSPACE-SPIKE.md): the app comes up on :8000
  # and serves the chat UI; bind mounts need Podman's `:U` so the non-root
  # `openhands` user can write its SQLite DB.
  #
  # Auth lives IN the box, not at the edge: OpenHands binds to 127.0.0.1 and an
  # in-box Caddy basic-auth proxy fronts it on the exposed port (:8080). So the
  # box self-protects — the platform edge just forwards plain HTTP to :8080 and
  # terminates TLS — and a box is never reachable without credentials. The
  # auth_password parameter is required for exactly that reason. Validated live
  # (2026-06-18): no/wrong creds → 401, correct creds → 200; OpenHands itself is
  # not directly reachable. Auth + transport flow validated end to end in-box.
  #
  # The Anthropic key/model are set in the OpenHands settings UI on first visit
  # (the run command takes no LLM env). Production hardening: seed credentials
  # via the tenant secrets mechanism once the env contract is confirmed. Still
  # pending live acceptance: a real model call (needs a key). Resource sizing is
  # generous; trim after profiling.
  - id: agent-workspace
    name: Agent Workspace
    description: Web chat workspace (chat + live preview + multiple persisted sessions) running OpenHands inside an always-on box, behind in-box basic auth; co-work with a coding agent in the browser, then ship to a box.
    image: images:ubuntu/24.04
    requires_gpu: false
    resources:
      cpu: "4"
      memory: 8GB
      disk: 60GB
    ports:
      # The in-box auth proxy — fronts the OpenHands UI (chat + preview +
      # conversation list). OpenHands itself stays on 127.0.0.1.
      - container_port: 8080
        subdomain: workspace
    parameters:
      - name: auth_password
        label: Workspace password
        description: Password for the in-box basic-auth proxy in front of the workspace UI. Required — the box is never exposed without it.
        type: password
        required: true
      - name: auth_user
        label: Workspace username
        description: Username for the in-box basic-auth proxy.
        type: string
        default: admin
      - name: openhands_version
        label: OpenHands version
        description: OpenHands Agent Canvas image tag to run (pin for reproducibility).
        type: string
        default: 1.0.0-rc.11
    post_start:
      - mkdir -p /opt/openhands-state /opt/openhands-projects /opt/wsauth
      - podman pull docker.io/library/caddy:2 >/dev/null
      # Idempotent: drop any prior containers so a re-run of post_start (retry,
      # re-deploy) doesn't abort under `set -e` on "name already in use".
      - podman rm -f openhands wsauth 2>/dev/null || true
      # Run the OpenHands web app bound to localhost: chat + preview + persisted
      # conversations. `:U` chowns the bind mounts to the container's non-root
      # user so it can write its SQLite state (validated 2026-06-18).
      - |
        podman run -d --name openhands --restart=always \
          -p 127.0.0.1:8000:8000 \
          -v /opt/openhands-state:/home/openhands/.openhands:U \
          -v /opt/openhands-projects:/projects:U \
          "ghcr.io/openhands/agent-canvas:${CONTAINARIUM_PARAM_OPENHANDS_VERSION}"
      # In-box auth proxy on :8080 → 127.0.0.1:8000. Two ways in: HTTP basic
      # auth, OR a session cookie the proxy itself issues on a successful
      # basic-auth response. The cookie is SameSite=None so the browser sends it
      # to this box even from an iframe embedded in the console on another
      # origin — so after one top-level sign-in the embedded workspace loads with
      # no prompt (browsers suppress basic-auth prompts in cross-origin iframes).
      # The cookie value is a per-box random token; the console needs no secret.
      # The password is bcrypt-hashed at deploy; the hash's '$' come from
      # variable expansion and are not re-expanded by the heredoc. auto_https
      # off: the edge terminates TLS, the in-box proxy speaks plain HTTP.
      - |
        WS_HASH=$(podman run --rm docker.io/library/caddy:2 caddy hash-password --plaintext "$CONTAINARIUM_PARAM_AUTH_PASSWORD")
        WS_TOKEN=$(head -c 24 /dev/urandom | od -An -tx1 | tr -d ' \n')
        # Fail loudly rather than write a malformed auth config (empty hash →
        # a degenerate basic_auth entry, empty token → no cookie gate).
        [ -n "$WS_HASH" ] && [ -n "$WS_TOKEN" ] || { echo "agent-workspace: empty auth hash/token; aborting" >&2; exit 1; }
        # Persist the token (mode 0600) so the daemon can read it and hand the
        # console a zero-click bootstrap URL (RecipeService.GetWorkspaceAccess).
        printf '%s' "$WS_TOKEN" > /opt/wsauth/token
        chmod 600 /opt/wsauth/token
        cat > /opt/wsauth/Caddyfile <<EOF
        {
          auto_https off
        }
        :8080 {
          # Zero-click bootstrap: the console opens /__ws_login?t=<token>; the
          # proxy sets the SameSite=None cookie and redirects to the app, so no
          # sign-in prompt is ever shown in the embedded iframe.
          @login {
            path /__ws_login
            query t=$WS_TOKEN
          }
          handle @login {
            header +Set-Cookie "ws_auth=$WS_TOKEN; Path=/; HttpOnly; Secure; SameSite=None"
            # `redir * / 302`: the explicit `*` matcher keeps Caddy from reading
            # the leading `/` as a path matcher (which makes the redirect a no-op).
            redir * / 302
          }
          # Cookie path: seamless once the cookie is set. Anchored to the
          # cookie name=value boundary so a crafted cookie can't slip the token
          # in as a substring of another value.
          @authed header_regexp Cookie "(^|;\s*)ws_auth=$WS_TOKEN($|;)"
          handle @authed {
            reverse_proxy 127.0.0.1:8000
          }
          # Fallback: HTTP basic auth, which also issues the cookie.
          handle {
            basic_auth {
              $CONTAINARIUM_PARAM_AUTH_USER $WS_HASH
            }
            reverse_proxy 127.0.0.1:8000 {
              header_down +Set-Cookie "ws_auth=$WS_TOKEN; Path=/; HttpOnly; Secure; SameSite=None"
            }
          }
        }
        EOF
      - |
        podman run -d --name wsauth --restart=always --network host \
          -v /opt/wsauth/Caddyfile:/etc/caddy/Caddyfile:ro \
          docker.io/library/caddy:2

  # librechat is the MANAGED CHAT WORKSPACE: LibreChat (github.com/danny-avila/
  # LibreChat, MIT) packaged in a box and wired to the platform model-gateway.
  # Where agent-workspace (OpenHands) is a bring-your-own-key coding canvas, this
  # is the command-center surface: the OPERATOR picks the models, the box talks
  # to them through the daemon's gateway (provider key on the HOST, never in the
  # box, metered), and a user can SWITCH among the curated models but cannot
  # supply their own key — LibreChat's custom endpoint takes its key from the
  # box env (the seeded gateway token), so there is no user-key field to lock.
  #
  # The gateway wiring is automatic via `model_gateway_provider: gemini-openai`:
  # the daemon seeds CONTAINARIUM_MODEL_GATEWAY_URL + CONTAINARIUM_GATEWAY_TOKEN
  # into post_start (internal/server/recipe_server.go gatewayEnvForRecipe). On a
  # self-hosted daemon with no provider key those are absent and the box comes up
  # with an empty endpoint set (LibreChat then uses its own config — OSS fallback).
  #
  # LibreChat + MongoDB run via Podman on the box's host network; the web UI
  # (:3080) is exposed as a subdomain. The admin user is created from the
  # auth_email/auth_password params (first user = admin), then self-registration
  # is locked off so only that admin can sign in.
  - id: librechat
    name: LibreChat Workspace
    description: Managed chat workspace — LibreChat wired to the platform model-gateway (curated models, no user keys) in an isolated always-on box.
    image: images:ubuntu/24.04
    requires_gpu: false
    resources:
      cpu: "4"
      memory: 4GB
      disk: 20GB
    model_gateway_provider: gemini-openai
    ports:
      # The exposed port is the in-box zero-click proxy (lcproxy / Caddy), NOT
      # LibreChat directly. The proxy fronts LibreChat on 127.0.0.1:3080: it adds
      # a /__ws_login?t= bootstrap (one-time login → SameSite=None session cookie)
      # so the console can embed the workspace in an iframe with no re-login, and
      # rewrites LibreChat's SameSite=Strict session cookies to None so they
      # survive the cross-site iframe. LibreChat's own /login still works through
      # the proxy as a fallback.
      - container_port: 8080
        subdomain: chat
    parameters:
      - name: auth_email
        label: Owner email
        description: Email for the workspace owner login (created at deploy; self-registration is then disabled). The cloud sets this to the deploying user's email.
        type: string
        default: admin@workspace.local
      - name: auth_name
        label: Owner name
        description: Display name for the workspace owner (and derived username). The cloud sets this to the deploying user's name; falls back to "Admin".
        type: string
        default: Admin
      - name: auth_password
        label: Owner password
        description: Password for the workspace owner login. Required — the box is never left open.
        type: password
        required: true
      - name: librechat_version
        label: LibreChat image tag
        description: LibreChat image tag to run (pin for reproducibility).
        type: string
        default: latest
      - name: librechat_ui
        label: Embedded UI mode
        description: >-
          How much of LibreChat the embedded iframe shows. "full" (default)
          embeds the whole LibreChat UI — left nav, conversation history, agents
          builder, the tools/MCP menu, presets. "chat" hides the left nav so the
          iframe shows only the chat pane. Either way the enforced model-spec
          still pins the assistant, and zero-click login is unchanged.
        type: string
        default: full
      - name: skills
        label: Installed skills (hidden personas)
        description: >-
          JSON array of the workspace's installed skills, as
          [{"name":"...","instructions":"..."}]. Each becomes a hidden model-spec
          the user picks BY NAME in LibreChat's selector — the conversation then
          runs under that skill's instructions, which are never shown in the UI
          (they live server-side in librechat.yaml, so they stay hidden even with
          the full UI embedded). The cloud injects the org's installed set; empty
          leaves only the default general assistant.
        type: string
      # Optional: inject the Containarium MCP so the chat agent can operate the
      # platform from the conversation (list/deploy boxes, expose ports, run
      # skills). Both must be set to enable it. The TOKEN must be scoped +
      # revocable and LEAST-PRIVILEGE — a chat agent is prompt-injectable, so it
      # should carry only read + recipes:deploy + agents:run scopes, never
      # delete / secrets / route-write. Scoping is the minter's job (the cloud
      # mints an org-scoped token at deploy); the recipe wires what it's handed.
      - name: mcp_server_url
        label: MCP target API URL
        description: Containarium API URL the in-box MCP targets (e.g. https://cloud.containarium.dev). Empty disables MCP injection.
        type: string
      - name: mcp_token
        label: MCP scoped token
        description: Scoped, revocable least-privilege Containarium token for the in-box MCP. Empty disables MCP injection.
        type: password
    post_start:
      - mkdir -p /opt/lc /opt/lc/mongo
      - command -v curl >/dev/null 2>&1 && command -v openssl >/dev/null 2>&1 && command -v python3 >/dev/null 2>&1 || { export DEBIAN_FRONTEND=noninteractive; apt-get update -qq && apt-get install -y -qq curl openssl python3 >/dev/null; }
      - podman pull docker.io/library/mongo:7 >/dev/null
      - 'podman pull "ghcr.io/danny-avila/librechat:${CONTAINARIUM_PARAM_LIBRECHAT_VERSION}" >/dev/null'
      # LibreChat config: one custom endpoint at the platform gateway. apiKey is
      # the seeded gateway token (LibreChat env-expands ${CTN_GATEWAY_TOKEN}), so
      # the box holds no real provider key and users can't supply their own. No
      # gateway seeded → empty config, LibreChat falls back to its own provider.
      - |
        if [ -n "${CONTAINARIUM_MODEL_GATEWAY_URL:-}" ] && [ -n "${CONTAINARIUM_GATEWAY_TOKEN:-}" ]; then
          printf 'version: 1.2.1\ncache: true\nendpoints:\n  custom:\n    - name: "Containarium (Gemini)"\n      apiKey: "${CTN_GATEWAY_TOKEN}"\n      baseURL: "%s/v1beta/openai"\n      models:\n        default: ["gemini-2.5-flash", "gemini-2.5-pro"]\n        fetch: false\n      titleConvo: true\n      titleModel: "gemini-2.5-flash"\n      modelDisplayLabel: "Containarium Gemini"\n' "$CONTAINARIUM_MODEL_GATEWAY_URL" > /opt/lc/librechat.yaml
        else
          printf 'version: 1.2.1\ncache: true\n' > /opt/lc/librechat.yaml
          echo 'librechat: no managed gateway seeded; configure a provider in LibreChat' >&2
        fi
      # Optional MCP injection: when mcp_server_url + mcp_token are set, install
      # the Containarium MCP (stdio) and wire it into LibreChat so the chat agent
      # can operate the platform (list/deploy boxes, expose ports, run skills),
      # scoped to whatever the token allows (enforced server-side). LibreChat
      # spawns the MCP command INSIDE its own container, so the binary + token are
      # mounted in via $LC_MCP_MOUNTS (added to the librechat run below).
      - |
        LC_MCP_MOUNTS=""
        if [ -n "${CONTAINARIUM_PARAM_MCP_SERVER_URL:-}" ] && [ -n "${CONTAINARIUM_PARAM_MCP_TOKEN:-}" ]; then
          if curl -fsSL https://github.com/FootprintAI/Containarium/releases/latest/download/mcp-server-linux-amd64 -o /opt/lc/mcp-server 2>/dev/null; then
            chmod +x /opt/lc/mcp-server
            printf '%s' "$CONTAINARIUM_PARAM_MCP_TOKEN" > /opt/lc/ctn-token
            # 0644, not 0600: LibreChat (and the mcp-server it spawns) run as the
            # in-image 'node' user (uid 1000), and the token is bind-mounted in
            # read-only — a root-only 0600 file is unreadable by node and the MCP
            # silently fails to start. The box is single-tenant and the token is
            # already a scoped, revocable, least-privilege credential.
            chmod 644 /opt/lc/ctn-token
            printf 'mcpServers:\n  containarium:\n    type: stdio\n    command: /usr/local/bin/mcp-server\n    args: []\n    env:\n      CONTAINARIUM_SERVER_URL: "%s"\n      CONTAINARIUM_JWT_TOKEN_FILE: "/opt/lc/ctn-token"\n' "$CONTAINARIUM_PARAM_MCP_SERVER_URL" >> /opt/lc/librechat.yaml
            LC_MCP_MOUNTS="-v /opt/lc/mcp-server:/usr/local/bin/mcp-server:ro -v /opt/lc/ctn-token:/opt/lc/ctn-token:ro"
          else
            echo 'librechat: mcp-server download failed; skipping MCP injection' >&2
          fi
        fi
      - |
        {
          echo "HOST=0.0.0.0"
          echo "PORT=3080"
          echo "MONGO_URI=mongodb://127.0.0.1:27017/LibreChat"
          echo "CONFIG_PATH=/app/librechat.yaml"
          echo "ALLOW_REGISTRATION=true"
          echo "ALLOW_EMAIL_LOGIN=true"
          echo "SEARCH=false"
          echo "JWT_SECRET=$(openssl rand -hex 32)"
          echo "JWT_REFRESH_SECRET=$(openssl rand -hex 32)"
          echo "CREDS_KEY=$(openssl rand -hex 32)"
          echo "CREDS_IV=$(openssl rand -hex 16)"
          echo "CTN_GATEWAY_TOKEN=${CONTAINARIUM_GATEWAY_TOKEN:-}"
        } > /opt/lc/.env
      - podman rm -f mongo librechat 2>/dev/null || true
      - podman run -d --name mongo --restart=always --network host -v /opt/lc/mongo:/data/db docker.io/library/mongo:7 >/dev/null
      - 'podman run -d --name librechat --restart=always --network host --env-file /opt/lc/.env -v /opt/lc/librechat.yaml:/app/librechat.yaml:ro ${LC_MCP_MOUNTS:-} "ghcr.io/danny-avila/librechat:${CONTAINARIUM_PARAM_LIBRECHAT_VERSION}" >/dev/null'
      # Wait for the API, create the OWNER from params (first user = owner), named
      # after the deploying user (the cloud passes auth_name/auth_email). NOTE: the
      # agents API rejects requests with no User-Agent ("Illegal request"), so all
      # agent/auth calls below send one.
      - |
        UA="Mozilla/5.0 (X11; Linux x86_64) Chrome/120 Safari/537.36"
        for i in $(seq 1 60); do
          code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3080/ 2>/dev/null || echo 000)
          if [ "$code" = "200" ]; then break; fi
          sleep 3
        done
        # Username derived from the email local-part (sanitized to a valid handle).
        LC_USER=$(printf '%s' "${CONTAINARIUM_PARAM_AUTH_EMAIL%%@*}" | tr -cd 'a-zA-Z0-9._-' | cut -c1-40)
        [ -n "$LC_USER" ] || LC_USER=owner
        curl -fsS -A "$UA" -X POST http://127.0.0.1:3080/api/auth/register -H 'Content-Type: application/json' \
          -d "{\"name\":\"$CONTAINARIUM_PARAM_AUTH_NAME\",\"username\":\"$LC_USER\",\"email\":\"$CONTAINARIUM_PARAM_AUTH_EMAIL\",\"password\":\"$CONTAINARIUM_PARAM_AUTH_PASSWORD\",\"confirm_password\":\"$CONTAINARIUM_PARAM_AUTH_PASSWORD\"}" \
          >/dev/null 2>&1 || echo 'librechat: owner register failed (may already exist)' >&2
      # Model-specs = SKILLS as hidden personas. Each installed skill becomes a
      # model-spec the user picks BY NAME in LibreChat's selector; the whole
      # conversation then runs under that skill's `promptPrefix` (its hidden
      # instructions). The prompt is NEVER shown in the UI — it lives here in
      # librechat.yaml, server-side, so it stays hidden even with the full UI
      # embedded (a LibreChat "agent" would expose its instructions in the agents
      # builder; a model-spec promptPrefix does not). A default "Containarium
      # Workspace" general assistant is always present and is the default pick.
      #
      # The spec targets the CUSTOM endpoint directly: LibreChat's frontend posts
      # chat turns to the custom endpoint ("Containarium (Gemini)", endpointType
      # custom), so a spec with `endpoint: "agents"` would never match and every
      # turn would fail "Model spec mismatch" (buildEndpointOption.js) → the UI
      # spins forever. Skills come from the `skills` param (JSON, the cloud
      # injects the org's installed set). Built with python3 so multi-line
      # SKILL.md prompts serialize safely (json.dumps → valid YAML scalars).
      # Needs the gateway; emits nothing without it (LibreChat falls back).
      - |
        python3 - >> /opt/lc/librechat.yaml <<'PYEOF'
        import json, os
        if not (os.environ.get("CONTAINARIUM_MODEL_GATEWAY_URL") and os.environ.get("CONTAINARIUM_GATEWAY_TOKEN")):
            raise SystemExit(0)  # no managed gateway → no specs; LibreChat falls back
