        import json, os
        json.dump({"email": os.environ["CONTAINARIUM_PARAM_AUTH_EMAIL"],
                   "password": os.environ["CONTAINARIUM_PARAM_AUTH_PASSWORD"]},
                  open("/opt/wsauth/lc-creds", "w"))
