        cat > /opt/wsauth/bootstrap.py <<'PYEOF'
        # Zero-click auth bootstrap for the LibreChat workspace (stdlib only).
        # /__mint        -> single-use, short-lived handoff token (in-box only)
        # /__ws_login?t= -> consume token, fresh LibreChat login, set the session
        #                   cookies rewritten to SameSite=None;Secure, redirect to /
        import http.server, urllib.request, json, secrets, time, re
        from urllib.parse import urlparse, parse_qs

        LC = "http://127.0.0.1:3080"
        CREDS = "/opt/wsauth/lc-creds"
        TTL = 120
        _tokens = {}  # token -> expiry epoch

        def _gc():
            now = time.time()
            for k in [k for k, v in _tokens.items() if v < now]:
                _tokens.pop(k, None)

        def _samesite_none(c):
            c = re.sub(r';\s*SameSite=\w+', '', c, flags=re.I)
            if 'secure' not in c.lower():
                c += '; Secure'
            return c + '; SameSite=None'

        class H(http.server.BaseHTTPRequestHandler):
            def log_message(self, *a):
                pass

            def do_GET(self):
                u = urlparse(self.path)
                if u.path == "/__mint":
                    _gc()
                    t = secrets.token_urlsafe(24)
                    _tokens[t] = time.time() + TTL
                    self._raw(200, t.encode(), "text/plain")
                    return
                if u.path in ("/", ""):
                    # Chat-only: serve LibreChat's SPA shell with a <style> that
                    # hides the left nav so the embedded iframe shows only the chat
                    # pane (our Manage drawer is the single sidebar). Purely
                    # additive — if a selector misses, the nav just stays visible.
                    self._shell()
                    return
                if u.path == "/__ws_login":
                    _gc()
                    t = (parse_qs(u.query).get("t") or [""])[0]
                    if not t or _tokens.pop(t, None) is None:  # missing/expired/used
                        self._redirect("/login")
                        return
                    cookies = self._login()
                    if not cookies:
                        self._redirect("/login")
                        return
                    self.send_response(302)
                    self.send_header("Location", "/")
                    for c in cookies:
                        self.send_header("Set-Cookie", c)
                    self.end_headers()
                    return
                self._raw(404, b"not found", "text/plain")

            def _shell(self):
                try:
                    with urllib.request.urlopen(LC + "/", timeout=10) as r:
                        html = r.read().decode("utf-8", "replace")
                        ct = r.headers.get("Content-Type", "text/html; charset=utf-8")
                except Exception:
                    self._redirect("/login")
                    return
                css = ("<style>/* Containarium chat-only */"
                       "nav,aside.nav,[data-testid=\"nav\"],#nav{display:none!important}"
                       "main,[role=\"main\"]{margin-left:0!important;width:100%!important}"
                       "</style>")
                if "</head>" in html:
                    html = html.replace("</head>", css + "</head>", 1)
                else:
                    html = css + html
                self._raw(200, html.encode("utf-8"), ct)

            def _login(self):
                try:
                    creds = json.load(open(CREDS))
                    body = json.dumps({"email": creds["email"],
                                       "password": creds["password"]}).encode()
                    req = urllib.request.Request(
                        LC + "/api/auth/login", data=body,
                        headers={"Content-Type": "application/json"}, method="POST")
                    with urllib.request.urlopen(req, timeout=10) as r:
                        return [_samesite_none(c) for c in (r.headers.get_all("Set-Cookie") or [])]
                except Exception:
                    return None

            def _raw(self, code, body, ctype):
                self.send_response(code)
                self.send_header("Content-Type", ctype)
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)

            def _redirect(self, loc):
                self.send_response(302)
                self.send_header("Location", loc)
                self.end_headers()

        if __name__ == "__main__":
            http.server.HTTPServer(("127.0.0.1", 9099), H).serve_forever()
        PYEOF
      - |
        cat > /etc/systemd/system/wsauth-bootstrap.service <<'EOF'
        [Unit]
        Description=LibreChat zero-click auth bootstrap
        After=network.target
        [Service]
        ExecStart=/usr/bin/python3 /opt/wsauth/bootstrap.py
        Restart=always
        [Install]
        WantedBy=multi-user.target
        EOF
        systemctl daemon-reload
        systemctl enable --now wsauth-bootstrap.service >/dev/null 2>&1 || true
      - |
        # Built with echo (not a fixed heredoc) so the chat-only "/" route is
        # conditional on librechat_ui. In "full" mode (default) "/" falls through
        # to LibreChat → the whole UI (nav, history, agents, tools menu) embeds.
        # In "chat" mode the helper serves "/" with nav-hiding CSS so only the
        # chat pane shows. /__ws_login (zero-click) + the SameSite rewrite are the
        # same either way.
        {
          echo '{'
          echo '  auto_https off'
          echo '}'
          echo ':8080 {'
          echo '  handle /__ws_login* {'
          echo '    reverse_proxy 127.0.0.1:9099'
          echo '  }'
          if [ "${CONTAINARIUM_PARAM_LIBRECHAT_UI:-full}" = "chat" ]; then
            echo '  @root path /'
            echo '  handle @root {'
            echo '    reverse_proxy 127.0.0.1:9099'
            echo '  }'
          fi
          echo '  handle {'
          echo '    reverse_proxy 127.0.0.1:3080 {'
          echo '      header_down Set-Cookie "SameSite=Strict" "SameSite=None"'
          echo '    }'
          echo '  }'
          echo '}'
        } > /opt/wsauth/Caddyfile
      - podman rm -f lcproxy 2>/dev/null || true
      - |
        podman run -d --name lcproxy --restart=always --network host \
          -v /opt/wsauth/Caddyfile:/etc/caddy/Caddyfile:ro \
          docker.io/library/caddy:2 >/dev/null
